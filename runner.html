<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="theme-color" content="#0a0716" />
<title>Crowd Runner — Bloo Arcade</title>
<style>
  html, body { margin:0; padding:0; background:#0a0716; color:#fff; font-family: system-ui, sans-serif; height:100%; overflow:hidden; touch-action: none; -webkit-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent; overscroll-behavior: none; }
  #wrap { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; }
  canvas {
    background:#0a0716;
    box-shadow:0 0 60px rgba(255, 60, 170, 0.25), 0 12px 40px rgba(0,0,0,.7);
    border-radius:8px;
    /* Portrait-friendly: 9:16 if viewport is portrait, 16:9 if landscape */
    width: min(100vw, calc(100vh * 9 / 16));
    height: min(100vh, calc(100vw * 16 / 9));
    display:block;
  }
  #btn-back {
    position: fixed; top: max(14px, env(safe-area-inset-top)); left: max(14px, env(safe-area-inset-left));
    padding: 6px 12px; border-radius: 999px;
    background: rgba(20, 8, 40, 0.55); border: 1.5px solid rgba(255, 92, 184, 0.45);
    color: #fff; font-size: 12px; letter-spacing: .5px; font-weight: 600;
    text-decoration: none; cursor: pointer; z-index: 11;
    backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
  }
  #btn-mute {
    position: fixed; top: max(14px, env(safe-area-inset-top)); right: max(14px, env(safe-area-inset-right));
    width: 38px; height: 38px; border-radius: 50%;
    background: rgba(20, 8, 40, 0.55); border: 1.5px solid rgba(255, 92, 184, 0.45);
    color: #fff; font-size: 18px; display:flex; align-items:center; justify-content:center;
    cursor: pointer; z-index: 11;
    backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
  }
  #btn-board {
    position: fixed; top: max(14px, env(safe-area-inset-top));
    right: calc(max(14px, env(safe-area-inset-right)) + 48px);
    width: 38px; height: 38px; border-radius: 50%;
    background: rgba(20, 8, 40, 0.55); border: 1.5px solid rgba(255, 92, 184, 0.45);
    color: #fff; font-size: 17px; display:flex; align-items:center; justify-content:center;
    text-decoration: none; cursor: pointer; z-index: 11;
    backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
  }
  #title-tip { position:absolute; bottom:14px; left:50%; transform:translateX(-50%); font-size:12px; color:rgba(255,255,255,0.5); pointer-events:none; }
  @media (hover: none) and (pointer: coarse) { #title-tip { display:none; } }
</style>
</head>
<body>
<div id="wrap"><canvas id="c" width="540" height="960"></canvas></div>
<a id="btn-back" href="index.html">‹ MENU</a>
<a id="btn-board" href="leaderboard.html" title="Leaderboard">🏆</a>
<div id="btn-mute" title="Mute (M)">🔊</div>
<script src="leaderboard.js"></script>
<div id="title-tip">Steer: ← → / A D / drag &nbsp;·&nbsp; Fire: SPACE / tap &nbsp;·&nbsp; M to mute</div>

<script>
(() => {
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  ctx.imageSmoothingEnabled = true;
  const W = canvas.width, H = canvas.height;

  // ----- Audio (procedural) -----
  const Audio = (() => {
    let actx = null, master = null, muted = false;
    try { muted = localStorage.getItem('bloo.muted') === '1'; } catch(_) {}
    function ensure(){
      if (typeof window === 'undefined') return null;
      const AC = window.AudioContext || window.webkitAudioContext; if (!AC) return null;
      if (!actx) { actx = new AC(); master = actx.createGain(); master.gain.value = muted ? 0 : 0.5; master.connect(actx.destination); }
      if (actx.state === 'suspended') actx.resume();
      return actx;
    }
    addEventListener('keydown', ensure, { once: true });
    addEventListener('pointerdown', ensure, { once: true });
    addEventListener('touchstart', ensure, { once: true });
    function setMuted(m){ muted = m; if (master) master.gain.value = muted ? 0 : 0.5; try { localStorage.setItem('bloo.muted', muted ? '1' : '0'); } catch(_){} }
    function isMuted(){ return muted; }
    function tone(f, dur, type, opts={}){
      const c = ensure(); if (!c || muted) return;
      const t = c.currentTime; const o = c.createOscillator(); const g = c.createGain();
      o.type = type; o.frequency.setValueAtTime(f, t);
      if (opts.freqEnd) o.frequency.exponentialRampToValueAtTime(Math.max(40, opts.freqEnd), t + dur);
      const peak = opts.gain ?? 0.12;
      g.gain.setValueAtTime(0.0001, t);
      g.gain.exponentialRampToValueAtTime(peak, t + 0.005);
      g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
      o.connect(g).connect(master); o.start(t); o.stop(t + dur + 0.05);
    }
    function noise(dur, opts={}){
      const c = ensure(); if (!c || muted) return;
      const t = c.currentTime; const len = Math.floor(c.sampleRate * dur);
      const buf = c.createBuffer(1, len, c.sampleRate); const d = buf.getChannelData(0);
      for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
      const src = c.createBufferSource(); src.buffer = buf;
      const f = c.createBiquadFilter(); f.type = opts.filterType || 'bandpass'; f.frequency.value = opts.freq || 600; f.Q.value = opts.Q ?? 1;
      const g = c.createGain(); const peak = opts.gain ?? 0.1;
      g.gain.setValueAtTime(0.0001, t); g.gain.exponentialRampToValueAtTime(peak, t + 0.003); g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
      src.connect(f).connect(g).connect(master); src.start(t); src.stop(t + dur + 0.05);
    }
    return {
      ensure, setMuted, isMuted,
      shoot(){ tone(900, 0.05, 'square', { freqEnd: 1400, gain: 0.04 }); },
      gateMul(){ tone(660, 0.10, 'triangle', { gain: 0.18 }); setTimeout(()=>tone(880, 0.14, 'triangle', { gain: 0.16 }), 50); },
      gateAdd(){ tone(523, 0.10, 'triangle', { gain: 0.16 }); },
      gateBad(){ tone(220, 0.18, 'sawtooth', { freqEnd: 110, gain: 0.16 }); },
      enemyHit(){ noise(0.06, { freq: 800, gain: 0.08 }); },
      enemyKill(){ noise(0.16, { freq: 240, freqEnd: 80, gain: 0.14 }); },
      cloneLost(){ tone(400, 0.10, 'sawtooth', { freqEnd: 200, gain: 0.10 }); },
      bossHit(){ noise(0.08, { freq: 600, gain: 0.10 }); },
      bossDown(){ tone(330, 0.30, 'sawtooth', { freqEnd: 80, gain: 0.18 }); noise(0.30, { freq: 200, freqEnd: 60, gain: 0.10 }); },
      gameOver(){ [440,370,311,247,196].forEach((f,i)=>setTimeout(()=>tone(f,0.22,'triangle',{gain:0.18}), i*100)); },
    };
  })();

  // ----- Asset loading -----
  const ASSET_LIST = {
    bloo:     'sprites/character/bloo_back.png',
    fireball: 'sprites/effects/fireball.png',
  };
  const ASSETS = {};
  let assetsLoaded = 0, assetsTotal = Object.keys(ASSET_LIST).length;
  for (const [k, src] of Object.entries(ASSET_LIST)) {
    const img = new Image();
    img.onload = () => { assetsLoaded++; };
    img.onerror = () => { assetsLoaded++; img._failed = true; };
    img.src = src;
    ASSETS[k] = img;
  }
  function ready() { return assetsLoaded >= assetsTotal; }

  // ----- Input -----
  const keys = {};
  addEventListener('keydown', e => { keys[e.code] = true; });
  addEventListener('keyup', e => { keys[e.code] = false; if (e.code === 'KeyM') { Audio.setMuted(!Audio.isMuted()); refreshMute(); } });

  // Pointer input: drag to steer, quick tap to fire
  let dragX = null, dragStartX = null, dragActive = false, dragMoved = 0, pointerStartT = 0;
  let steerInput = 0;     // -1..+1 desired horizontal speed
  let tapFire = false;    // one-frame impulse from a tap
  let fireKeyHeld = false; // edge-trigger guard for keyboard / sustained touch

  function onPointerDown(e){
    Audio.ensure();
    // If the run is over and the fade-in completed, ANY tap restarts.
    if (gameOver && gameOverT > 25) { reset(); e.preventDefault && e.preventDefault(); return; }
    const p = e.touches ? e.touches[0] : e;
    dragX = dragStartX = p.clientX;
    dragActive = true; dragMoved = 0;
    pointerStartT = performance.now ? performance.now() : Date.now();
    e.preventDefault && e.preventDefault();
  }
  function onPointerMove(e){
    if (!dragActive) return;
    const p = e.touches ? e.touches[0] : e; if (!p) return;
    const dx = p.clientX - dragX;
    if (Math.abs(dx) > 1) { steerInput += dx * 0.0035; dragX = p.clientX; dragMoved += Math.abs(dx); }
    e.preventDefault && e.preventDefault();
  }
  function onPointerUp(e){
    if (dragActive) {
      const dt = (performance.now ? performance.now() : Date.now()) - pointerStartT;
      // Quick, near-stationary press → treat as a tap → fire
      if (dt < 250 && dragMoved < 8) tapFire = true;
    }
    dragActive = false; dragX = null;
    e && e.preventDefault && e.preventDefault();
  }
  canvas.addEventListener('touchstart', onPointerDown, { passive: false });
  canvas.addEventListener('touchmove', onPointerMove, { passive: false });
  canvas.addEventListener('touchend', onPointerUp, { passive: false });
  canvas.addEventListener('touchcancel', onPointerUp, { passive: false });
  canvas.addEventListener('mousedown', onPointerDown);
  canvas.addEventListener('mousemove', onPointerMove);
  canvas.addEventListener('mouseup', onPointerUp);
  canvas.addEventListener('mouseleave', () => { dragActive = false; dragX = null; });

  // Mute button
  const muteBtn = document.getElementById('btn-mute');
  function refreshMute(){ muteBtn.textContent = Audio.isMuted() ? '🔇' : '🔊'; }
  refreshMute();
  muteBtn.addEventListener('click', () => { Audio.setMuted(!Audio.isMuted()); refreshMute(); });

  // ============================================================================
  // GAME STATE
  // ============================================================================
  // Lane: trapezoid — wider at the bottom (near camera), narrower at top (far)
  const LANE_W_BOTTOM = 460;          // lane width at the bottom of the screen
  const LANE_W_TOP    = 260;          // lane width at the top of the screen
  const LANE_X_BOTTOM = (W - LANE_W_BOTTOM) / 2;
  const LANE_X_TOP    = (W - LANE_W_TOP) / 2;
  // Helper: compute the lane left & width at a given screen y
  function laneAtY(y) {
    const t = Math.max(0, Math.min(1, y / H));
    const w = LANE_W_TOP + (LANE_W_BOTTOM - LANE_W_TOP) * t;
    const x = (W - w) / 2;
    return { x, w, right: x + w };
  }
  // Backwards-compat for code that uses the old constants — these are at the
  // leader's screen Y, so steering bounds match where the leader actually is
  const LANE_W = LANE_W_BOTTOM;       // bottom width — used for boss size, etc.
  const LANE_X = LANE_X_BOTTOM;
  const LANE_RIGHT = LANE_X + LANE_W;

  // World scrolls "down" past the camera; positions are in world coords.
  // The crowd's leader is at a fixed screenY = LEADER_Y in canvas coords.
  const LEADER_Y = H - 180; // where the crowd is drawn

  // Camera distance traveled
  let camY = 0;
  let scrollSpeed = 4.4;    // base scroll (was 3.8) — runners feel uncomfortable
  const CROWD_CAP = 35;     // tighter cap — keeps multipliers from feeling pointless
  let distance = 0;         // total distance traveled
  let bestDistance = 0;
  try { bestDistance = parseInt(localStorage.getItem('bloo.runner.best') || '0', 10); } catch(_) {}

  // Player crowd
  const clones = [];        // each: {x, y, kind:'leader'|'follower', t}
  // The leader has a worldY equal to camY + LEADER_Y and a worldX
  let leaderX = LANE_X + LANE_W / 2;
  function spawnClones(n) {
    for (let i = 0; i < n; i++) clones.push({ x: leaderX + (Math.random()-0.5)*60, y: LEADER_Y + (Math.random()-0.4)*30, t: Math.random()*Math.PI*2 });
  }
  function killClone(idx) {
    if (idx < 0 || idx >= clones.length) return;
    clones.splice(idx, 1);
    Audio.cloneLost();
    // Game over the moment the last clone falls, regardless of cause
    if (clones.length === 0 && !gameOver) endGame();
  }

  // Bullets (player fires manually now)
  const bullets = [];
  let fireCooldown = 0;
  const FIRE_INTERVAL = 9;        // min frames between volleys (rate-limit click spam)
  let firePressed = false;        // edge-trigger so holding doesn't auto-fire
  const enemyShots = [];          // projectiles fired by casters and bosses
  function spawnEnemyShot(x, y, vx, vy, big) {
    enemyShots.push({ x, y, vx, vy, life: 240, big: !!big });
  }
  // Score (separate from distance — earned by killing things)
  let score = 0;
  let bestScore = 0;
  try { bestScore = parseInt(localStorage.getItem('bloo.runner.bestScore') || '0', 10); } catch(_) {}

  // Gates — span across the lane horizontally, two halves with different effects
  const gates = [];
  let nextGateY = -200; // first gate worldY (negative because world scrolls down)

  // Enemies
  const enemies = [];
  let nextEnemyY = -600;

  // Boss
  let boss = null;
  let nextBossDistance = 800;

  // Particles
  const particles = [];
  function burst(x, y, color, count = 8) {
    for (let i = 0; i < count; i++) particles.push({ x, y, vx: (Math.random()-0.5)*4, vy: (Math.random()-0.5)*4, life: 24, color });
  }

  // Game state
  let gameOver = false;
  let gameOverT = 0;
  let started = false; // wait for first input

  function reset() {
    clones.length = 0; bullets.length = 0; gates.length = 0; enemies.length = 0; particles.length = 0;
    enemyShots.length = 0;
    boss = null;
    leaderX = LANE_X + LANE_W / 2;
    spawnClones(5);
    camY = 0; distance = 0; scrollSpeed = 4.4; score = 0;
    nextGateY = -200; nextEnemyY = -600; nextBossDistance = 800;
    gameOver = false; gameOverT = 0; steerInput = 0;
    fireKeyHeld = false; tapFire = false;
  }
  reset();

  // ============================================================================
  // SPAWNING
  // ============================================================================
  function spawnGate() {
    // Two half-gates side-by-side. Player chooses which half to pass through.
    // Each half has a label showing what happens to the crowd count.
    // Mostly positive options to make it feel rewarding; bad halves are obvious.
    const halfW = LANE_W / 2;
    const left  = pickGateOp(false);
    const right = pickGateOp(false);
    // Make sure not both bad
    let l = left, r = right;
    if (l.score < 0 && r.score < 0) r = pickGateOp(true);
    gates.push({
      worldY: nextGateY,
      h: 70,
      left:  { ...l, x: LANE_X,         w: halfW, hit: false },
      right: { ...r, x: LANE_X + halfW, w: halfW, hit: false },
    });
    nextGateY -= 480 + Math.random() * 180;
  }
  function pickGateOp(forcePositive) {
    const r = Math.random();
    // Late-game gates have more bad halves: ~20% → 50% by 3000m
    const badBias = Math.min(0.20, distance / 10000);
    // Multipliers are RARE now (was 40%, now 18%). Most positive gates are +adds.
    const mulCutoff  = 0.18;
    const addCutoff  = 0.55 - badBias;
    const subCutoff  = 0.80;
    if (forcePositive || r < mulCutoff) {
      // Only ×2 — no more ×3 snowball
      return { type: 'mul', value: 2, label: '×2', color: '#5fe87a', score: 1 };
    } else if (r < addCutoff) {
      // Additive +2..+6 — small steady bonuses
      const a = 2 + Math.floor(Math.random() * 5);
      return { type: 'add', value: a, label: '+' + a, color: '#9cd6ff', score: 1 };
    } else if (r < subCutoff) {
      // Subtract −5..−15
      const a = 5 + Math.floor(Math.random() * 11);
      return { type: 'sub', value: a, label: '−' + a, color: '#ff5c8a', score: -1 };
    } else {
      // Divide ÷2..÷3
      const d = 2 + Math.floor(Math.random() * 2);
      return { type: 'div', value: d, label: '÷' + d, color: '#ff5c8a', score: -1 };
    }
  }
  function applyGate(op) {
    const before = clones.length;
    let target = before;
    if (op.type === 'mul') target = before * op.value;
    else if (op.type === 'add') target = before + op.value;
    else if (op.type === 'sub') target = Math.max(0, before - op.value);
    else if (op.type === 'div') target = Math.max(1, Math.floor(before / op.value));
    target = Math.min(target, CROWD_CAP); // hard cap stops trivial snowballing

    if (target > before) {
      spawnClones(target - before);
      if (op.type === 'mul') Audio.gateMul(); else Audio.gateAdd();
      burst(leaderX, LEADER_Y, op.color, 14);
    } else if (target < before) {
      // remove from end
      const remove = before - target;
      for (let i = 0; i < remove; i++) clones.pop();
      Audio.gateBad();
      burst(leaderX, LEADER_Y, op.color, 10);
    }
    if (clones.length === 0 && !gameOver) endGame();
  }

  function spawnEnemy() {
    const spawnLane = laneAtY(0);
    // Sometimes spawn a row of 2-3 enemies side by side to overwhelm the crowd
    const groupSize = Math.random() < Math.min(0.55, 0.2 + distance / 4000) ? (2 + Math.floor(Math.random() * 2)) : 1;
    const baseHp = 1 + Math.floor(distance / 350);
    for (let i = 0; i < groupSize; i++) {
      // Choose enemy type — caster type that fires fireballs appears past 800m
      const wantCaster = distance > 800 && Math.random() < 0.18;
      const type = wantCaster ? 'caster' : 'shadow';
      const x = spawnLane.x + 20 + (groupSize === 1
        ? Math.random() * (spawnLane.w - 40)
        : (i + 0.5) * (spawnLane.w - 40) / groupSize);
      enemies.push({
        worldY: nextEnemyY - i * 6,
        x, w: type === 'caster' ? 30 : 32, h: type === 'caster' ? 34 : 36,
        hp: type === 'caster' ? Math.max(2, baseHp) : baseHp,
        type, fireT: 30 + Math.random() * 30,
      });
    }
    // Tighter spacing as distance grows
    const minGap = Math.max(80, 150 - distance / 40);
    nextEnemyY -= minGap + Math.random() * 80;
  }

  // (enemyShots and spawnEnemyShot declared earlier near bullets)

  function spawnBoss() {
    const hp = 220 + Math.floor(distance / 250) * 50;  // significantly tougher
    const topLane = laneAtY(H * 0.18);
    boss = {
      worldY: camY - 90,
      hp, hpMax: hp,
      w: topLane.w - 20,
      h: 70,
      x: topLane.x + 10,
      defeated: false, defeatT: 0,
    };
  }

  // ============================================================================
  // UPDATE
  // ============================================================================
  function update() {
    if (gameOver) { gameOverT++; return; }
    if (!started) {
      // any input starts the run
      if (keys['ArrowLeft'] || keys['ArrowRight'] || keys['KeyA'] || keys['KeyD'] ||
          keys['Space'] || dragActive || tapFire || steerInput !== 0) {
        started = true;
        tapFire = false; fireKeyHeld = true; // don't fire on the very first frame
      } else return;
    }

    // Speed ramp — base 4.4, climbs to 9.5 by 2500m. Hits hard.
    scrollSpeed = 4.4 + Math.min(5.1, distance / 600);

    // Boss freezes scroll
    const scrolling = !boss || boss.defeated;
    if (scrolling) {
      camY -= scrollSpeed;
      distance += scrollSpeed;
    }

    // Steering
    let move = 0;
    if (keys['ArrowLeft'] || keys['KeyA']) move -= 1;
    if (keys['ArrowRight'] || keys['KeyD']) move += 1;
    move += Math.max(-1, Math.min(1, steerInput));
    steerInput *= 0.7;
    leaderX += move * 5;
    // Steering bounds use the lane width AT the leader's y (bottom of screen)
    const leaderLane = laneAtY(LEADER_Y);
    leaderX = Math.max(leaderLane.x + 26, Math.min(leaderLane.right - 26, leaderX));

    // Clones follow leader in formation: phyllotaxis-ish spread
    for (let i = 0; i < clones.length; i++) {
      const c = clones[i];
      // target position: spread around leader in concentric arcs behind
      const ring = Math.floor(Math.sqrt(i + 1));
      const slot = i - ring*ring + ring;
      const angle = (slot / Math.max(1, ring*2 + 1)) * Math.PI - Math.PI/2;
      const r = 16 + ring * 14;
      const tx = leaderX + Math.cos(angle) * r;
      const ty = LEADER_Y + Math.abs(Math.sin(angle)) * r * 0.7 + 4;
      c.x += (tx - c.x) * 0.18;
      c.y += (ty - c.y) * 0.22;
      c.t = (c.t || 0) + 0.18 + (i % 3) * 0.02;
    }

    // Spawn gates / enemies as world scrolls
    while (nextGateY > camY - H - 50) spawnGate();
    while (nextEnemyY > camY - H - 50 && !boss) spawnEnemy();
    if (!boss && distance > nextBossDistance) {
      spawnBoss();
      nextBossDistance = distance + 700 + Math.random() * 300;  // bosses every ~800m
    }

    // Manual fire — every clone fires one bullet, rate-limited
    fireCooldown--;
    const wantsFire = (keys['Space'] || tapFire) && !fireKeyHeld;
    if (wantsFire && fireCooldown <= 0 && clones.length > 0) {
      // Whole army fires together (capped to avoid extreme bullet counts)
      const volleySize = Math.min(clones.length, 30);
      // Pick distinct clones if possible
      const indices = [];
      if (clones.length <= volleySize) {
        for (let i = 0; i < clones.length; i++) indices.push(i);
      } else {
        const seen = new Set();
        while (indices.length < volleySize) {
          const idx = Math.floor(Math.random() * clones.length);
          if (!seen.has(idx)) { seen.add(idx); indices.push(idx); }
        }
      }
      for (const idx of indices) {
        const c = clones[idx];
        bullets.push({ x: c.x + (Math.random()-0.5)*4, y: c.y - 8, worldY: camY + (c.y - 8), vy: -11 });
      }
      Audio.shoot();
      fireCooldown = FIRE_INTERVAL;
      fireKeyHeld = true;
    }
    if (!keys['Space'] && !tapFire) fireKeyHeld = false;
    tapFire = false; // tapFire is a one-frame impulse from touch

    // Update bullets (in world coords; convert to screen for display)
    for (const b of bullets) {
      b.worldY += b.vy;
      b.y = b.worldY - camY;
    }
    for (let i = bullets.length - 1; i >= 0; i--) {
      const b = bullets[i];
      if (b.y < -20) bullets.splice(i, 1);
    }

    // Update enemies — they always descend toward the player, even faster during boss
    for (const e of enemies) {
      const baseDescent = scrolling ? 0.8 : 2.4;     // even when scrolling, enemies push forward
      e.worldY += baseDescent;
      e.screenY = e.worldY - camY;
      // Drift toward leader
      const drift = e.type === 'caster' ? 0.4 : 0.8;
      if (e.x < leaderX - 1) e.x += drift;
      else if (e.x > leaderX + 1) e.x -= drift;
      // Clamp inside the lane
      const lane = laneAtY(e.screenY);
      e.x = Math.max(lane.x + 14, Math.min(lane.right - 14, e.x));
      // Casters fire shots periodically
      if (e.type === 'caster') {
        e.fireT--;
        if (e.fireT <= 0 && e.screenY > 30 && e.screenY < H - 100) {
          // Aim at the leader
          const dx = leaderX - e.x;
          const dy = LEADER_Y - e.screenY;
          const d = Math.max(40, Math.hypot(dx, dy));
          const sp = 5;
          spawnEnemyShot(e.x, e.screenY + 10, sp * dx / d, sp * dy / d, false);
          e.fireT = 90 + Math.random() * 40;
        }
      }
    }

    // Bullet vs enemy collision (kills award points)
    for (const b of bullets) {
      for (const e of enemies) {
        if (e.hp <= 0) continue;
        if (b.x > e.x - e.w/2 && b.x < e.x + e.w/2 &&
            b.y > e.screenY - e.h/2 && b.y < e.screenY + e.h/2) {
          e.hp--;
          b.dead = true;
          burst(b.x, b.y, '#ffffff', 4);
          if (e.hp <= 0) {
            Audio.enemyKill(); burst(e.x, e.screenY, '#a020a0', 12);
            // Score: more for tougher enemies, scales with distance
            const base = e.type === 'caster' ? 25 : 10;
            const mult = 1 + Math.floor(distance / 1000);
            score += base * mult;
          } else Audio.enemyHit();
          break;
        }
      }
    }
    for (let i = bullets.length - 1; i >= 0; i--) if (bullets[i].dead) bullets.splice(i, 1);

    // Enemy vs clone collision (when enemy reaches the crowd, it kills clones around it)
    for (const e of enemies) {
      if (e.hp <= 0) continue;
      if (e.screenY > LEADER_Y - 40 && e.screenY < LEADER_Y + 40) {
        // hit nearby clones
        for (let i = clones.length - 1; i >= 0; i--) {
          const c = clones[i];
          const dx = c.x - e.x, dy = c.y - e.screenY;
          if (dx*dx + dy*dy < 26*26) {
            killClone(i);
            e.hp--;
            burst(c.x, c.y, '#88ccff', 8);
            if (e.hp <= 0) { Audio.enemyKill(); break; }
          }
        }
      }
    }
    // Remove dead/passed enemies
    for (let i = enemies.length - 1; i >= 0; i--) {
      if (enemies[i].hp <= 0 || enemies[i].screenY > H + 40) enemies.splice(i, 1);
    }

    // Boss
    if (boss && !boss.defeated) {
      // Boss settles at top quarter, blocks scroll. Faster slide-in.
      const target = H * 0.18;
      boss.screenY = boss.worldY - camY;
      if (boss.screenY < target) { boss.worldY += 4.5; }
      else { boss.worldY = camY + target; }

      // Bullet vs boss
      for (const b of bullets) {
        if (b.dead) continue;
        if (b.x > boss.x && b.x < boss.x + boss.w &&
            b.y > boss.screenY - 10 && b.y < boss.screenY + boss.h + 10) {
          boss.hp--;
          b.dead = true;
          if (Math.random() < 0.3) Audio.bossHit();
          burst(b.x, b.y, '#ff5cb8', 4);
        }
      }
      for (let i = bullets.length - 1; i >= 0; i--) if (bullets[i].dead) bullets.splice(i, 1);

      // Boss attacks: minion spawns + targeted fireballs
      boss._t = (boss._t || 0) + 1;
      // Spawn a minion every 70 frames (was 140)
      if (boss._t % 70 === 0) {
        const lane = Math.floor(Math.random() * 3);
        enemies.push({
          worldY: boss.worldY + boss.h + 10,
          x: boss.x + 30 + lane * (boss.w - 60) / 2,
          w: 28, h: 28,
          hp: 1 + Math.floor(distance / 1500),
          type: 'shadow',
          fireT: 0,
        });
      }
      // Fire a big fireball aimed at the leader every ~110 frames
      if (boss._t % 110 === 50) {
        const dx = leaderX - (boss.x + boss.w/2);
        const dy = LEADER_Y - (boss.screenY + boss.h);
        const d = Math.max(60, Math.hypot(dx, dy));
        const sp = 4;
        spawnEnemyShot(boss.x + boss.w/2, boss.screenY + boss.h, sp * dx / d, sp * dy / d, true);
      }

      if (boss.hp <= 0) {
        boss.defeated = true; boss.defeatT = 0;
        Audio.bossDown();
        burst(boss.x + boss.w/2, boss.screenY + boss.h/2, '#ff5cb8', 40);
        // Big score for the boss
        const mult = 1 + Math.floor(distance / 1000);
        score += 500 * mult;
      }
    }
    if (boss && boss.defeated) {
      boss.defeatT++;
      if (boss.defeatT > 80) boss = null;
    }

    // Enemy projectiles — fly in a straight line, kill clones on hit
    for (const s of enemyShots) {
      s.x += s.vx; s.y += s.vy; s.life--;
      // Hit a clone?
      for (let i = clones.length - 1; i >= 0; i--) {
        const c = clones[i];
        const dx = c.x - s.x, dy = c.y - s.y;
        const r = s.big ? 22 : 14;
        if (dx*dx + dy*dy < r*r) {
          // Big shots kill 2 clones
          killClone(i);
          if (s.big && clones.length > 0) killClone(clones.length - 1);
          burst(s.x, s.y, '#ff5cb8', 8);
          s.life = 0;
          break;
        }
      }
    }
    for (let i = enemyShots.length - 1; i >= 0; i--) if (enemyShots[i].life <= 0 || enemyShots[i].y > H + 40) enemyShots.splice(i, 1);

    // Particles
    for (const p of particles) { p.x += p.vx; p.y += p.vy; p.vy += 0.18; p.life--; }
    for (let i = particles.length - 1; i >= 0; i--) if (particles[i].life <= 0) particles.splice(i, 1);

    // Gate collisions — only the gate the leader passes through is "hit"
    for (const g of gates) {
      g.screenY = g.worldY - camY;
      if (!g.left.hit && !g.right.hit && g.screenY >= LEADER_Y - 10 && g.screenY <= LEADER_Y + 30) {
        if (leaderX < LANE_X + LANE_W / 2) { g.left.hit = true; applyGate(g.left); }
        else { g.right.hit = true; applyGate(g.right); }
      }
    }
    // Remove off-screen gates
    for (let i = gates.length - 1; i >= 0; i--) {
      if (gates[i].screenY > H + 80) gates.splice(i, 1);
    }

    // Restart key — R, Space, or Enter
    if (gameOver && gameOverT > 25 && (keys['KeyR'] || keys['Space'] || keys['Enter'])) reset();
  }

  function endGame() {
    if (gameOver) return;
    gameOver = true; gameOverT = 0;
    Audio.gameOver();
    if (Math.floor(distance) > bestDistance) {
      bestDistance = Math.floor(distance);
      try { localStorage.setItem('bloo.runner.best', String(bestDistance)); } catch(_) {}
    }
    if (score > bestScore) {
      bestScore = score;
      try { localStorage.setItem('bloo.runner.bestScore', String(score)); } catch(_) {}
    }
    // Leaderboard submission (prompt for name on first run)
    try {
      if (typeof BlooLB !== 'undefined') {
        BlooLB.ensureUsername().then(() => {
          BlooLB.submitScore('runner', score, { distance: Math.floor(distance) });
        });
      }
    } catch (_) {}
  }

  // ============================================================================
  // RENDER
  // ============================================================================
  function drawBg() {
    // Background outside the lane (dark forest)
    ctx.fillStyle = '#0a0716'; ctx.fillRect(0, 0, W, H);

    // Lane: trapezoid — wider at bottom for over-the-shoulder perspective
    const top = laneAtY(0), bot = laneAtY(H);
    const g = ctx.createLinearGradient(0, 0, 0, H);
    g.addColorStop(0, '#1a0e3a');
    g.addColorStop(1, '#0f0820');
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.moveTo(top.x, 0);
    ctx.lineTo(top.right, 0);
    ctx.lineTo(bot.right, H);
    ctx.lineTo(bot.x, H);
    ctx.closePath();
    ctx.fill();

    // Glowing pink lane edges (converging for perspective)
    ctx.strokeStyle = 'rgba(255, 92, 184, 0.55)';
    ctx.lineWidth = 3;
    ctx.shadowColor = '#ff5cb8'; ctx.shadowBlur = 12;
    ctx.beginPath(); ctx.moveTo(top.x, 0); ctx.lineTo(bot.x, H); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(top.right, 0); ctx.lineTo(bot.right, H); ctx.stroke();
    ctx.shadowBlur = 0;

    // Inner dashed lane dividers — converge toward vanishing point + scroll
    ctx.strokeStyle = 'rgba(255, 255, 255, 0.10)';
    ctx.lineWidth = 1;
    ctx.setLineDash([18, 22]);
    const offset = (-camY) % 40;
    ctx.lineDashOffset = -offset;
    for (let i = 1; i < 4; i++) {
      const tx = top.x + (top.w * i) / 4;
      const bx = bot.x + (bot.w * i) / 4;
      ctx.beginPath(); ctx.moveTo(tx, 0); ctx.lineTo(bx, H); ctx.stroke();
    }
    ctx.setLineDash([]);

    // Horizontal "rungs" that shrink toward the top — perspective floor lines
    ctx.strokeStyle = 'rgba(156, 214, 255, 0.10)';
    for (let i = 0; i < 12; i++) {
      // World-space y, scrolling with camY, mapped to screen y via parallax
      const worldY = (-camY + i * 90) % 1080;
      // Use exponential mapping so closer rungs are spaced wider
      const t = (worldY / 1080);
      const screenY = t * H;
      const lane = laneAtY(screenY);
      ctx.beginPath();
      ctx.moveTo(lane.x, screenY);
      ctx.lineTo(lane.right, screenY);
      ctx.stroke();
    }

    // Ambient drifting dots
    ctx.fillStyle = 'rgba(255, 92, 184, 0.45)';
    for (let i = 0; i < 12; i++) {
      const px = (Math.sin(i * 12.9 + (-camY) * 0.001) * 0.5 + 0.5) * W;
      const py = ((-camY * 0.5 + i * 80) % H + H) % H;
      ctx.beginPath(); ctx.arc(px, py, 2, 0, Math.PI*2); ctx.fill();
    }
  }

  function drawGates() {
    for (const g of gates) {
      const sy = g.screenY = g.worldY - camY;
      if (sy < -100 || sy > H + 100) continue;
      // Width of the gate matches lane width at this screen Y
      const lane = laneAtY(sy + g.h / 2);
      const halfW = lane.w / 2;
      // Update half geometry to current screen position
      g.left.x  = lane.x;
      g.left.w  = halfW;
      g.right.x = lane.x + halfW;
      g.right.w = halfW;
      // Scale label size by perspective (smaller when far)
      const scale = 0.55 + 0.45 * Math.max(0, Math.min(1, sy / H));
      drawGateHalf(g.left, sy, g.h, scale);
      drawGateHalf(g.right, sy, g.h, scale);
    }
  }
  function drawGateHalf(half, y, h, scale) {
    const c = hexToRgb(half.color);
    const a = half.hit ? 0.15 : 0.55;
    ctx.fillStyle = `rgba(${c.r},${c.g},${c.b},${a})`;
    ctx.fillRect(half.x, y, half.w, h);
    ctx.strokeStyle = half.color;
    ctx.lineWidth = 2;
    ctx.strokeRect(half.x + 1, y + 1, half.w - 2, h - 2);
    if (!half.hit) {
      ctx.shadowColor = half.color; ctx.shadowBlur = 12;
      ctx.fillStyle = `rgba(${c.r},${c.g},${c.b},${0.3})`;
      ctx.fillRect(half.x + 4, y + 4, half.w - 8, h - 8);
      ctx.shadowBlur = 0;
    }
    ctx.fillStyle = '#fff';
    const fontSize = Math.round(28 * scale);
    ctx.font = `bold ${fontSize}px system-ui, sans-serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(half.label, half.x + half.w / 2, y + h / 2 + 1);
  }
  function hexToRgb(hex){
    const m = hex.replace('#','');
    return { r: parseInt(m.slice(0,2),16), g: parseInt(m.slice(2,4),16), b: parseInt(m.slice(4,6),16) };
  }

  function drawEnemies() {
    for (const e of enemies) {
      const y = e.screenY;
      if (y < -50 || y > H + 50) continue;
      // Perspective scale — smaller when far (top of screen)
      const s = 0.55 + 0.45 * Math.max(0, Math.min(1, y / H));
      const w = e.w * s, h = e.h * s;
      ctx.shadowColor = '#a020a0'; ctx.shadowBlur = 14 * s;
      ctx.fillStyle = '#3a0a55';
      ctx.beginPath(); ctx.ellipse(e.x, y, w/2, h/2, 0, 0, Math.PI*2); ctx.fill();
      ctx.shadowBlur = 0;
      ctx.fillStyle = '#ff3030';
      ctx.beginPath(); ctx.arc(e.x - 6*s, y - 3*s, 3*s, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(e.x + 6*s, y - 3*s, 3*s, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle = '#fff'; ctx.lineWidth = 1.5 * s;
      ctx.beginPath();
      ctx.moveTo(e.x - 5*s, y + 6*s); ctx.lineTo(e.x - 2*s, y + 4*s);
      ctx.lineTo(e.x + 1*s, y + 6*s); ctx.lineTo(e.x + 4*s, y + 4*s);
      ctx.lineTo(e.x + 7*s, y + 6*s);
      ctx.stroke();
      if (e.hp > 1) {
        ctx.fillStyle = '#fff';
        ctx.font = `bold ${Math.round(11 * s)}px system-ui`;
        ctx.textAlign = 'center';
        ctx.fillText(String(e.hp), e.x, y + h/2 + 12 * s);
      }
    }
  }

  function drawBoss() {
    if (!boss) return;
    const x = boss.x, y = boss.screenY;
    if (boss.defeated) {
      // Disintegrate animation
      const t = boss.defeatT / 80;
      ctx.globalAlpha = 1 - t;
    }
    // Big shadow body
    ctx.shadowColor = '#a020a0'; ctx.shadowBlur = 30;
    const grad = ctx.createLinearGradient(0, y, 0, y + boss.h);
    grad.addColorStop(0, '#3a0a55');
    grad.addColorStop(1, '#1a0030');
    ctx.fillStyle = grad;
    roundRect(x, y, boss.w, boss.h, 14);
    ctx.fill();
    ctx.shadowBlur = 0;
    // pink rim
    ctx.strokeStyle = '#ff5cb8'; ctx.lineWidth = 2.5;
    roundRect(x, y, boss.w, boss.h, 14); ctx.stroke();
    // glowing eyes
    ctx.shadowColor = '#ff3030'; ctx.shadowBlur = 14;
    ctx.fillStyle = '#ff3030';
    ctx.beginPath(); ctx.arc(x + boss.w*0.3, y + boss.h/2, 6, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(x + boss.w*0.7, y + boss.h/2, 6, 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0;

    // HP bar above the boss
    const hpW = boss.w;
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(x, y - 14, hpW, 8);
    ctx.fillStyle = '#ff5cb8';
    ctx.fillRect(x, y - 14, hpW * Math.max(0, boss.hp / boss.hpMax), 8);
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 1; ctx.strokeRect(x, y - 14, hpW, 8);

    ctx.globalAlpha = 1;
  }

  function drawClones() {
    // Sort by y so back clones draw first (smaller y first)
    const sorted = clones.slice().sort((a, b) => a.y - b.y);
    for (let i = 0; i < sorted.length; i++) {
      const c = sorted[i];
      const img = ASSETS.bloo;
      // tiny bob with individual phase
      const bob = Math.sin((c.t || 0) * 0.3) * 1.5;
      const isLeader = (i === sorted.length - 1);
      const size = isLeader ? 44 : 34;  // leader slightly bigger
      if (!img || !img.width) {
        ctx.fillStyle = '#1f6fd1';
        ctx.beginPath(); ctx.arc(c.x, c.y + bob, size * 0.4, 0, Math.PI*2); ctx.fill();
        continue;
      }
      ctx.drawImage(img, c.x - size/2, c.y - size/2 + bob, size, size);
    }
  }

  function drawBullets() {
    for (const b of bullets) {
      ctx.shadowColor = '#9cd6ff'; ctx.shadowBlur = 10;
      ctx.fillStyle = '#9cd6ff';
      ctx.fillRect(b.x - 2, b.y - 8, 4, 12);
    }
    ctx.shadowBlur = 0;
  }

  function drawEnemyShots() {
    for (const s of enemyShots) {
      // Use the painted fireball sprite when available; fall back to glowing pink dot
      if (ASSETS.fireball && ASSETS.fireball.width) {
        const w = s.big ? 56 : 36, h = w * 0.55;
        // Rotate so the trail points opposite the direction of motion
        const ang = Math.atan2(s.vy, s.vx);
        ctx.save();
        ctx.translate(s.x, s.y);
        ctx.rotate(ang);
        ctx.shadowColor = '#ff3aa8'; ctx.shadowBlur = s.big ? 20 : 12;
        ctx.drawImage(ASSETS.fireball, -w/2, -h/2, w, h);
        ctx.shadowBlur = 0;
        ctx.restore();
      } else {
        ctx.shadowColor = '#ff3aa8'; ctx.shadowBlur = 14;
        ctx.fillStyle = '#ff5cb8';
        ctx.beginPath(); ctx.arc(s.x, s.y, s.big ? 10 : 6, 0, Math.PI*2); ctx.fill();
        ctx.shadowBlur = 0;
      }
    }
  }

  function drawParticles() {
    for (const p of particles) {
      ctx.globalAlpha = Math.max(0, p.life / 24);
      ctx.fillStyle = p.color;
      ctx.fillRect(p.x - 2, p.y - 2, 4, 4);
    }
    ctx.globalAlpha = 1;
  }

  function drawHUD() {
    // Crowd count, top-left
    ctx.fillStyle = 'rgba(10,5,25,0.7)';
    roundRect(14, 60, 124, 40, 10); ctx.fill();
    ctx.strokeStyle = 'rgba(255,92,184,0.5)'; ctx.lineWidth = 1.5; ctx.stroke();

    ctx.fillStyle = '#fff'; ctx.font = 'bold 22px system-ui'; ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
    ctx.shadowColor = '#9cd6ff'; ctx.shadowBlur = 6;
    ctx.fillText('×' + clones.length, 28, 80);
    ctx.shadowBlur = 0;
    ctx.fillStyle = 'rgba(255,255,255,0.55)'; ctx.font = 'bold 11px system-ui';
    ctx.fillText('CLONES', 76, 80);

    // SCORE — big, top-center, with best
    ctx.fillStyle = 'rgba(10,5,25,0.7)';
    roundRect(W/2 - 70, 60, 140, 44, 12); ctx.fill();
    ctx.strokeStyle = 'rgba(156,214,255,0.45)'; ctx.lineWidth = 1.5; ctx.stroke();
    ctx.fillStyle = '#fff'; ctx.font = 'bold 22px system-ui'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.shadowColor = '#ffd54a'; ctx.shadowBlur = 8;
    ctx.fillText(String(score), W/2, 78);
    ctx.shadowBlur = 0;
    ctx.fillStyle = 'rgba(255,255,255,0.45)'; ctx.font = 'bold 9px system-ui';
    ctx.fillText('SCORE · BEST ' + bestScore, W/2, 96);

    // Distance, secondary, below score
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.font = 'bold 11px system-ui'; ctx.textAlign = 'center';
    ctx.fillText(Math.floor(distance) + ' m  ·  best ' + bestDistance + ' m', W/2, 116);

    // Fire-rate indicator: small bar shows FIRE cooldown
    if (fireCooldown > 0) {
      const pct = fireCooldown / FIRE_INTERVAL;
      ctx.fillStyle = 'rgba(255,255,255,0.20)';
      ctx.fillRect(14, 108, 124, 4);
      ctx.fillStyle = 'rgba(156,214,255,0.7)';
      ctx.fillRect(14, 108, 124 * (1 - pct), 4);
    }
  }

  function drawTitle() {
    if (started) return;
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.fillRect(0, H*0.30, W, 220);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 36px system-ui'; ctx.textAlign = 'center';
    ctx.fillText('Crowd Runner', W/2, H*0.40);
    ctx.fillStyle = '#ff8de0'; ctx.font = 'bold 14px system-ui';
    ctx.fillText('STEER · FIRE · SURVIVE', W/2, H*0.44);
    ctx.fillStyle = 'rgba(255,255,255,0.78)'; ctx.font = '14px system-ui';
    ctx.fillText('← →  /  A D  /  drag — steer', W/2, H*0.49);
    ctx.fillText('SPACE  /  tap — fire (each clone shoots)', W/2, H*0.53);
    ctx.fillStyle = '#fff'; ctx.font = 'bold 13px system-ui';
    ctx.fillText('PRESS ANY KEY OR TAP TO START', W/2, H*0.58);
  }

  function drawGameOver() {
    if (!gameOver) return;
    const a = Math.min(0.85, gameOverT / 30);
    ctx.fillStyle = `rgba(0,0,0,${a})`;
    ctx.fillRect(0, 0, W, H);
    if (gameOverT > 20) {
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 42px system-ui'; ctx.textAlign = 'center';
      ctx.fillText('CROWD LOST', W/2, H*0.36);
      // Score is the primary stat now
      ctx.shadowColor = '#ffd54a'; ctx.shadowBlur = 12;
      ctx.fillStyle = '#ffd54a'; ctx.font = 'bold 56px system-ui';
      ctx.fillText(String(score), W/2, H*0.46);
      ctx.shadowBlur = 0;
      ctx.fillStyle = '#ff8de0'; ctx.font = 'bold 14px system-ui';
      ctx.fillText('SCORE  ·  best ' + bestScore, W/2, H*0.50);
      ctx.fillStyle = 'rgba(255,255,255,0.7)'; ctx.font = '14px system-ui';
      ctx.fillText('Distance: ' + Math.floor(distance) + ' m  ·  best ' + bestDistance + ' m', W/2, H*0.55);
      // Pulsing call to action button
      const pulse = 0.85 + Math.sin(gameOverT * 0.08) * 0.15;
      ctx.save();
      ctx.globalAlpha = pulse;
      ctx.fillStyle = '#ff5cb8';
      ctx.shadowColor = '#ff8de0'; ctx.shadowBlur = 18;
      const btnW = 220, btnH = 44, btnX = W/2 - btnW/2, btnY = H*0.62;
      roundRect(btnX, btnY, btnW, btnH, 22);
      ctx.fill();
      ctx.shadowBlur = 0;
      ctx.fillStyle = '#fff'; ctx.font = 'bold 16px system-ui'; ctx.textAlign = 'center';
      ctx.fillText('TAP TO PLAY AGAIN', W/2, btnY + 28);
      ctx.restore();
      ctx.fillStyle = 'rgba(255,255,255,0.5)'; ctx.font = '11px system-ui';
      ctx.fillText('or press R / SPACE', W/2, H*0.62 + 64);
    }
  }

  function roundRect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x+r, y);
    ctx.lineTo(x+w-r, y); ctx.quadraticCurveTo(x+w, y, x+w, y+r);
    ctx.lineTo(x+w, y+h-r); ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
    ctx.lineTo(x+r, y+h); ctx.quadraticCurveTo(x, y+h, x, y+h-r);
    ctx.lineTo(x, y+r); ctx.quadraticCurveTo(x, y, x+r, y);
    ctx.closePath();
  }

  function drawLoading() {
    ctx.fillStyle = '#0a0716'; ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#fff'; ctx.font = 'bold 18px system-ui'; ctx.textAlign = 'center';
    ctx.fillText('Loading… ' + assetsLoaded + '/' + assetsTotal, W/2, H/2);
  }

  function frame() {
    if (!ready()) {
      drawLoading();
      requestAnimationFrame(frame);
      return;
    }
    update();
    drawBg();
    drawGates();
    drawEnemies();
    drawBoss();
    drawClones();
    drawBullets();
    drawEnemyShots();
    drawParticles();
    drawHUD();
    drawTitle();
    drawGameOver();
    requestAnimationFrame(frame);
  }
  frame();
})();
</script>
</body>
</html>
