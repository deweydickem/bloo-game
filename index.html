<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="theme-color" content="#0a0716" />
<title>Blue Spirit — Forest of Embers</title>
<style>
  html, body { margin:0; padding:0; background:#0a0716; color:#e8d8ff; font-family: system-ui, sans-serif; height:100%; overflow:hidden; touch-action: none; -webkit-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent; overscroll-behavior: none; }
  #wrap { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; }
  canvas {
    background:#0a0716;
    box-shadow:0 0 60px rgba(255, 60, 170, 0.25), 0 12px 40px rgba(0,0,0,.7);
    border-radius:8px;
    /* Scale to fit viewport while preserving 16:9 aspect ratio */
    width: min(100vw, calc(100vh * 16 / 9));
    height: min(100vh, calc(100vw * 9 / 16));
    image-rendering: auto;
    display: block;
  }
  #title { position:absolute; top:14px; left:14px; font-size:13px; opacity:.55; pointer-events:none; letter-spacing:.5px; }
  #overlay { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; pointer-events:none; }
  #overlay div { background:rgba(20, 8, 40, 0.85); padding:18px 28px; border-radius:10px; font-size:22px; display:none; border:2px solid #ff5cb8; box-shadow:0 0 30px rgba(255,92,184,.4); color:#fff; max-width: 80vw; text-align: center; }
  .show { display:block !important; }

  /* ---------- Touch controls ---------- */
  #touch {
    position: fixed; inset: 0; pointer-events: none;
    display: none; /* shown only when touch is detected */
  }
  #touch.on { display: block; }
  .tbtn {
    position: absolute;
    bottom: max(24px, env(safe-area-inset-bottom));
    width: 78px; height: 78px;
    border-radius: 50%;
    background: rgba(20, 8, 40, 0.55);
    border: 2px solid rgba(255, 92, 184, 0.6);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    box-shadow: 0 0 18px rgba(255, 92, 184, 0.25);
    pointer-events: auto;
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-size: 28px; font-weight: bold;
    transition: transform .08s ease, background .08s ease;
    user-select: none; -webkit-user-select: none;
  }
  .tbtn:active, .tbtn.held {
    transform: scale(0.92);
    background: rgba(255, 92, 184, 0.35);
  }
  #btn-left  { left: max(20px, env(safe-area-inset-left)); }
  #btn-right { left: calc(max(20px, env(safe-area-inset-left)) + 92px); }
  #btn-jump  { right: max(20px, env(safe-area-inset-right)); }
  #title.mobile { display: none; }
  @media (hover: none) and (pointer: coarse) {
    #title { display: none; }
  }
</style>
</head>
<body>
<div id="title">Arrow keys / WASD — move&nbsp;&nbsp;·&nbsp;&nbsp;Space / Up — jump&nbsp;&nbsp;·&nbsp;&nbsp;Shift — run&nbsp;&nbsp;·&nbsp;&nbsp;R — restart</div>
<div id="wrap">
  <canvas id="c" width="960" height="540"></canvas>
</div>
<div id="overlay"><div id="msg"></div></div>
<div id="touch" aria-hidden="true">
  <div id="btn-left"  class="tbtn" data-key="ArrowLeft">‹</div>
  <div id="btn-right" class="tbtn" data-key="ArrowRight">›</div>
  <div id="btn-jump"  class="tbtn" data-key="Space">↑</div>
</div>
<script>
(() => {
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  ctx.imageSmoothingEnabled = true;
  ctx.imageSmoothingQuality = 'high';
  const W = canvas.width, H = canvas.height;

  // ----- Input -----
  const keys = {};
  addEventListener('keydown', e => { keys[e.code] = true; if (['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)) e.preventDefault(); });
  addEventListener('keyup',   e => { keys[e.code] = false; });

  // ----- Touch input — wire on-screen buttons to the same keys[] object -----
  // (Wrapped in try so headless test environments without `window` don't crash.)
  try {
    const touchEl = document.getElementById('touch');
    function enableTouchUI() { if (touchEl) touchEl.classList.add('on'); }
    const hasTouch = (typeof window !== 'undefined') && (
      ('ontouchstart' in window) ||
      ((typeof navigator !== 'undefined') && navigator.maxTouchPoints > 0)
    );
    if (hasTouch) enableTouchUI();
    if (typeof addEventListener !== 'undefined') {
      addEventListener('touchstart', enableTouchUI, { once: true });
    }

    const btns = ['btn-left','btn-right','btn-jump']
      .map(id => document.getElementById(id))
      .filter(b => b && b.dataset && b.addEventListener);
    for (const b of btns) {
      const code = b.dataset.key;
      const press = (e) => { e.preventDefault(); keys[code] = true; b.classList.add('held'); };
      const release = (e) => { e.preventDefault(); keys[code] = false; b.classList.remove('held'); };
      b.addEventListener('touchstart', press, { passive: false });
      b.addEventListener('touchend',   release, { passive: false });
      b.addEventListener('touchcancel', release, { passive: false });
      b.addEventListener('mousedown', press);
      b.addEventListener('mouseup',   release);
      b.addEventListener('mouseleave', release);
    }
  } catch (e) { /* ignore — non-browser env */ }

  // ----- Asset loading -----
  const ASSET_LIST = {
    idle1:    'sprites/character/idle_1.png',
    idle2:    'sprites/character/idle_2.png',
    run1:     'sprites/character/run_1.png',
    run2:     'sprites/character/run_2.png',
    run3:     'sprites/character/run_3.png',
    jump1:    'sprites/character/jump_1.png',
    jump2:    'sprites/character/jump_2.png',
    jump3:    'sprites/character/jump_3.png',
    attack:   'sprites/character/attack.png',
    hurt:     'sprites/character/hurt.png',
    grass1:   'sprites/tiles/grass_block_1.png',
    grass2:   'sprites/tiles/grass_block_2.png',
    bush:     'sprites/tiles/grass_bush.png',
    vines:    'sprites/tiles/grass_vines.png',
    sign:     'sprites/props/sign.png',
    plant:    'sprites/props/plant.png',
    arch:     'sprites/props/stone_arch.png',
    coin1:    'sprites/collectibles/coin_1.png',
    coin2:    'sprites/collectibles/coin_2.png',
    gem:      'sprites/collectibles/gem.png',
    orb:      'sprites/collectibles/orb.png',
    swirl:    'sprites/effects/portal_swirl.png',
    dust:     'sprites/effects/dust_cloud.png',
    sparkles: 'sprites/effects/sparkles.png',
    fireball: 'sprites/effects/fireball.png',
  };
  const ASSETS = {};
  let assetsLoaded = 0, assetsTotal = Object.keys(ASSET_LIST).length;
  for (const [k, src] of Object.entries(ASSET_LIST)) {
    const img = new Image();
    img.onload = () => { assetsLoaded++; };
    img.onerror = () => { assetsLoaded++; img._failed = true; };
    img.src = src;
    ASSETS[k] = img;
  }
  function allAssetsReady() { return assetsLoaded >= assetsTotal; }
  // back-compat alias
  const playerImg = ASSETS.idle1;
  let playerImgLoaded = false;

  // ----- World -----
  const TILE = 40;
  const GRAVITY = 0.45;        // floatier: was 0.7
  const APEX_GRAVITY = 0.22;   // gentler near jump apex (hang time)
  const FALL_GRAVITY = 0.55;   // a touch faster on the way down so it still feels controllable
  const MAX_FALL = 11;         // cap fall speed (was 16)
  const MOVE_ACC = 0.6;
  const RUN_ACC  = 0.9;
  const FRICTION = 0.82;
  const MAX_WALK = 4.2;
  const MAX_RUN  = 7.0;
  const JUMP_V   = -11.5;      // first jump (was -13.5) — lower since gravity is lower
  const JUMP2_V  = -10.0;      // double jump — slightly weaker
  const MAX_JUMPS = 2;         // double jump enabled

  // Level layout. '#'=ground, '='=brick, '?'=question, 'P'=pillar, 'F'=portal,
  // 'c'=coin, 'g'=spiky walker, 'd'=floating devil. ' '=empty, 'S'=start
  const level = [
    "                                                                                                                                                                                                ",
    "                                                                                                                                                                                                ",
    "                                                                                                d                                                                      F                        ",
    "                  ccc                                                                                                                                                  F                        ",
    "                                                                d                                                                                                      F                        ",
    "                                              c c c c                                                          cccc                                                    F                        ",
    "         c                  ===?===                                                                          ========                                       ccccc      F                        ",
    "         c                                                                                                                                                ===========  F                        ",
    "                                          =?=                                                                                                                          F                        ",
    "                                                              ===                              cc                                                                      F                        ",
    "  S                              g                                          g                                                  g          g                            F                        ",
    "##########################  ###############################  ##################  PP  #####################################  PPPP  ########################################################      ",
    "##########################  ###############################  ##################  PP  #####################################  PPPP  ########################################################      ",
  ];

  const ROWS = level.length;
  const COLS = level[0].length;
  const LEVEL_W = COLS * TILE;
  const LEVEL_H = ROWS * TILE;

  const solids = [];
  const coins = [];
  const enemies = [];
  const blocks = [];
  let portalX = 0, portalY = 0, portalH = 0;
  let startX = 80, startY = 100;

  function buildLevel() {
    solids.length = 0; coins.length = 0; enemies.length = 0; blocks.length = 0;
    let mushroomGiven = false;
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        const ch = level[r][c];
        const x = c * TILE, y = r * TILE;
        if (ch === '#') solids.push({x,y,w:TILE,h:TILE,type:'ground'});
        else if (ch === '=') {
          const b = {x,y,w:TILE,h:TILE,type:'brick',hit:false};
          solids.push({x,y,w:TILE,h:TILE,type:'brick'});
          blocks.push(b);
        }
        else if (ch === '?') {
          const b = {x,y,w:TILE,h:TILE,type:'question',hit:false,contains: mushroomGiven ? 'coin' : 'crystal'};
          mushroomGiven = true;
          solids.push({x,y,w:TILE,h:TILE,type:'question',ref:b});
          blocks.push(b);
        }
        else if (ch === 'P') solids.push({x,y,w:TILE,h:TILE,type:'pillar'});
        else if (ch === 'c') coins.push({x:x+TILE/2, y:y+TILE/2, r:11, taken:false, t:Math.random()*Math.PI*2});
        else if (ch === 'g') enemies.push({x:x+4, y:y+8, w:TILE-8, h:TILE-8, vx:-1.2, vy:0, alive:true, type:'spiky', squashT:0});
        else if (ch === 'd') enemies.push({x:x+4, y:y+4, w:TILE-8, h:TILE-8, vx:1.0, vy:0, alive:true, type:'devil', baseY:y+4, t:Math.random()*Math.PI*2, squashT:0});
        else if (ch === 'S') { startX = x; startY = y; }
      }
    }
    let top = ROWS, bot = 0;
    for (let r=0; r<ROWS; r++) for (let c=0; c<COLS; c++) if (level[r][c]==='F') { if (r<top) top=r; if (r>bot) bot=r; portalX = c*TILE + TILE/2; }
    portalY = top*TILE; portalH = (bot-top+1)*TILE;
  }
  buildLevel();

  // ----- Player -----
  const player = {
    x: startX, y: startY, w: 36, h: 44,
    vx: 0, vy: 0,
    onGround: false,
    facing: 1,
    big: false,
    invuln: 0,
    coins: 0,
    lives: 3,
    won: false,
    dead: false,
    deathT: 0,
    jumpsUsed: 0,           // double-jump tracker (resets on landing)
    jumpKeyHeld: false,     // edge-trigger so holding doesn't auto-bounce
  };
  function resetPlayer() {
    player.x = startX; player.y = startY;
    player.vx = 0; player.vy = 0;
    player.big = false; player.invuln = 60;
    player.dead = false; player.deathT = 0; player.won = false;
    player.jumpsUsed = 0; player.jumpKeyHeld = false;
  }

  const powerups = [];
  const particles = [];
  const popCoins = []; // Mario-style popping coins from bumped blocks
  const rings = [];    // expanding magic rings (e.g., double-jump flourish)
  function spawnPopCoin(x, y) {
    popCoins.push({ x, y, vx: (Math.random()-.5)*0.6, vy: -10, t: 0, life: 60, awarded: false });
  }
  const ambient = [];
  // pre-seed ambient particles
  for (let i = 0; i < 40; i++) ambient.push({x: Math.random()*W, y: Math.random()*H, vy: -0.2 - Math.random()*0.4, vx:(Math.random()-.5)*.3, life: 200 + Math.random()*300, hue: Math.random() < 0.5 ? '#ff6acb' : '#9cd6ff', size: 1 + Math.random()*2});

  function burst(x,y,color){
    for (let i=0; i<10; i++) particles.push({x,y,vx:(Math.random()-.5)*4, vy:-Math.random()*4-1, life:30, color});
  }

  // ----- Camera -----
  let camX = 0;
  function updateCamera() {
    const target = player.x - W*0.4;
    camX += (target - camX) * 0.15;
    camX = Math.max(0, Math.min(camX, LEVEL_W - W));
  }

  // ----- Collision helpers -----
  function rectsOverlap(a,b) { return a.x < b.x+b.w && a.x+a.w > b.x && a.y < b.y+b.h && a.y+a.h > b.y; }

  function moveAndCollide(ent, vx, vy) {
    ent.x += vx;
    for (const s of solids) {
      if (rectsOverlap(ent, s)) {
        if (vx > 0) ent.x = s.x - ent.w;
        else if (vx < 0) ent.x = s.x + s.w;
        ent.vx = 0;
        if (ent.isEnemy) ent.vx = -vx > 0 ? Math.abs(ent.vxBase || 1.2) : -Math.abs(ent.vxBase || 1.2);
      }
    }
    ent.y += vy;
    ent.onGround = false;
    for (const s of solids) {
      if (rectsOverlap(ent, s)) {
        if (vy > 0) { ent.y = s.y - ent.h; ent.vy = 0; ent.onGround = true; }
        else if (vy < 0) {
          ent.y = s.y + s.h; ent.vy = 0;
          if (ent === player && (s.type === 'question' || s.type === 'brick')) {
            const b = s.ref || blocks.find(b => b.x===s.x && b.y===s.y);
            if (b) {
              if (s.type === 'question' && !b.hit) {
                b.hit = true;
                if (b.contains === 'crystal') {
                  powerups.push({x:b.x+6, y:b.y - TILE, w:28, h:28, vx:1.5, vy:0, type:'crystal', emerging:20});
                } else {
                  // Mario-style coin pop: coin shoots up out of the block, arcs, falls
                  spawnPopCoin(b.x + TILE/2, b.y);
                }
                // bump animation
                b.bumpT = 8;
              } else if (s.type === 'brick') {
                // Bump animation either way
                b.bumpT = 8;
                // Any coins sitting on top of this brick now pop up
                let popped = 0;
                for (const c of coins) {
                  if (c.taken) continue;
                  // coin center is within brick width and one tile above the brick
                  if (Math.abs(c.x - (b.x + TILE/2)) < TILE/2 && Math.abs(c.y - (b.y - TILE/2)) < 22) {
                    c.taken = true;
                    spawnPopCoin(c.x, c.y);
                    popped++;
                  }
                }
                // Big player breaks the brick if there were no coins on top
                if (player.big && popped === 0 && !b.hit) {
                  b.hit = true; burst(b.x+TILE/2, b.y, '#5a3a8a');
                  const idx = solids.indexOf(s); if (idx>=0) solids.splice(idx,1);
                }
              }
            }
          }
        }
      }
    }
  }

  // ----- Update -----
  let animT = 0;
  function update() {
    animT++;
    if (player.won) return;
    if (player.dead) {
      player.deathT++;
      player.vy += GRAVITY*0.5;
      player.y += player.vy;
      if (player.deathT > 90) {
        player.lives--;
        if (player.lives <= 0) {
          showMsg('GAME OVER — press R to try again'); player.lives = 0;
        } else {
          resetPlayer();
        }
      }
      return;
    }

    const left  = keys['ArrowLeft']  || keys['KeyA'];
    const right = keys['ArrowRight'] || keys['KeyD'];
    const run   = keys['ShiftLeft']  || keys['ShiftRight'];
    const jump  = keys['Space']      || keys['ArrowUp'] || keys['KeyW'];

    const acc = run ? RUN_ACC : MOVE_ACC;
    const maxV = run ? MAX_RUN : MAX_WALK;
    if (left)  { player.vx -= acc; player.facing = -1; }
    if (right) { player.vx += acc; player.facing = 1; }
    if (!left && !right) player.vx *= FRICTION;
    if (Math.abs(player.vx) < 0.05) player.vx = 0;
    player.vx = Math.max(-maxV, Math.min(maxV, player.vx));

    // Edge-triggered jump: only fire when the key transitions from up to down
    const jumpPressed = jump && !player.jumpKeyHeld;
    player.jumpKeyHeld = jump;

    if (jumpPressed && player.jumpsUsed < MAX_JUMPS) {
      const isFirstJump = player.onGround || player.jumpsUsed === 0;
      player.vy = isFirstJump ? JUMP_V : JUMP2_V;
      player.onGround = false;
      player.jumpsUsed = isFirstJump ? 1 : 2;

      // Double jump: clean expanding magic ring at the feet — no particles
      if (!isFirstJump) {
        rings.push({
          x: player.x + player.w/2,
          y: player.y + player.h - 4,
          r: 4, life: 18, maxLife: 18, color: '#ff6acb'
        });
      }
    }
    // Variable jump height: cut upward velocity short if key released early
    if (!jump && player.vy < -4) player.vy = -4;

    // Apex hang: gentler gravity near the top of a jump for that whimsical feel
    let g;
    if (player.vy > 0)            g = FALL_GRAVITY;
    else if (player.vy > -2.5)    g = APEX_GRAVITY; // hang time band
    else                          g = GRAVITY;
    player.vy += g;
    if (player.vy > MAX_FALL) player.vy = MAX_FALL;

    player.h = player.big ? 64 : 44;

    moveAndCollide(player, player.vx, 0);
    const wasInAir = !player.onGround;
    moveAndCollide(player, 0, player.vy);
    // landed this frame → refresh double jump (no FX)
    if (wasInAir && player.onGround) {
      player.jumpsUsed = 0;
    }

    if (player.y > LEVEL_H + 200) killPlayer();
    if (player.invuln > 0) player.invuln--;

    // Coins
    for (const c of coins) {
      if (c.taken) continue;
      c.t += 0.15;
      const pcx = player.x + player.w/2, pcy = player.y + player.h/2;
      const dx = pcx - c.x, dy = pcy - c.y;
      if (dx*dx + dy*dy < (c.r + 16)**2) {
        c.taken = true; player.coins++; burst(c.x, c.y, '#ffd54a');
      }
    }

    // Enemies
    for (const e of enemies) {
      if (!e.alive) { e.squashT++; continue; }
      e.vxBase = e.type === 'devil' ? 1.0 : 1.2;
      e.isEnemy = true;
      if (e.type === 'devil') {
        // float, hover up/down, no gravity
        e.t = (e.t || 0) + 0.05;
        e.x += e.vx;
        e.y = e.baseY + Math.sin(e.t) * 14;
        // horizontal bounce off walls
        for (const s of solids) {
          if (rectsOverlap(e, s)) {
            if (e.vx > 0) e.x = s.x - e.w; else e.x = s.x + s.w;
            e.vx = -e.vx;
          }
        }
      } else {
        e.vy += GRAVITY;
        moveAndCollide(e, e.vx, 0);
        moveAndCollide(e, 0, e.vy);
      }
      if (rectsOverlap(player, e)) {
        // spiky walker can't be stomped — touching = damage
        const stompable = e.type === 'devil' ? false : false; // both unstompable (spikes)
        if (player.vy > 1 && (player.y + player.h) - e.y < 18 && !stompable) {
          // bounce off without dying if attacking from above on devil? no — both hurt
          if (player.invuln <= 0) {
            if (player.big) { player.big = false; player.invuln = 90; player.vy = -6; }
            else killPlayer();
          }
        } else if (player.invuln <= 0) {
          if (player.big) { player.big = false; player.invuln = 90; }
          else killPlayer();
        }
      }
    }

    // Powerups
    for (const p of powerups) {
      if (p.emerging > 0) { p.y -= 1.4; p.emerging--; continue; }
      p.vy += GRAVITY*0.7;
      moveAndCollide(p, p.vx, 0);
      if (p.vx === 0) p.vx = 1.5;
      moveAndCollide(p, 0, p.vy);
      if (rectsOverlap(player, p) && !p.taken) {
        p.taken = true;
        if (!player.big) { player.big = true; player.y -= 20; }
        else player.coins += 1;
        burst(p.x+p.w/2, p.y, '#ff5cb8');
      }
    }
    for (let i = powerups.length-1; i >= 0; i--) if (powerups[i].taken || powerups[i].y > LEVEL_H+100) powerups.splice(i,1);

    // Portal collision
    if (Math.abs(player.x + player.w/2 - portalX) < 28) {
      player.won = true;
      showMsg('YOU REACHED THE PORTAL! Crystals: ' + player.coins + ' — press R to play again');
    }

    // Particles
    for (const pa of particles) { pa.x += pa.vx; pa.y += pa.vy; pa.vy += 0.25; pa.life--; }
    for (let i = particles.length-1; i >= 0; i--) if (particles[i].life <= 0) particles.splice(i,1);

    // Popping coins (Mario-style): arc up, fall back, award on land or after life expires
    for (const pc of popCoins) {
      pc.t++;
      pc.vy += 0.5; // gravity
      pc.x += pc.vx; pc.y += pc.vy;
      pc.life--;
      // Award the coin once when it starts falling or expires
      if (!pc.awarded && (pc.vy >= 0 || pc.life <= 0)) {
        // award when peak reached
        if (pc.vy >= 0) {
          pc.awarded = true;
          player.coins++;
          burst(pc.x, pc.y, '#ffd54a');
        }
      }
    }
    for (let i = popCoins.length-1; i >= 0; i--) if (popCoins[i].life <= 0) popCoins.splice(i,1);

    // Block bump animations
    for (const b of blocks) if (b.bumpT) b.bumpT--;

    // Expanding rings
    for (const r of rings) { r.r += 2.6; r.life--; }
    for (let i = rings.length - 1; i >= 0; i--) if (rings[i].life <= 0) rings.splice(i, 1);

    // Ambient particles
    for (const a of ambient) {
      a.x += a.vx; a.y += a.vy; a.life--;
      if (a.life <= 0 || a.y < -10) {
        a.x = Math.random()*W; a.y = H + 10;
        a.life = 200 + Math.random()*300;
        a.vx = (Math.random()-.5)*.3;
        a.vy = -0.2 - Math.random()*0.4;
        a.size = 1 + Math.random()*2;
        a.hue = Math.random() < 0.5 ? '#ff6acb' : '#9cd6ff';
      }
    }

    if (keys['KeyR']) { player.coins = 0; player.lives = 3; buildLevel(); resetPlayer(); hideMsg(); }

    updateCamera();
  }

  function killPlayer() {
    if (player.dead) return;
    player.dead = true; player.deathT = 0; player.vy = -10; player.vx = 0;
    burst(player.x+player.w/2, player.y+player.h/2, '#88ccff');
  }

  // ============ DRAWING ============

  function drawSky() {
    // night gradient
    const g = ctx.createLinearGradient(0, 0, 0, H);
    g.addColorStop(0, '#1a0e3a');
    g.addColorStop(0.5, '#2a134a');
    g.addColorStop(1, '#0f0820');
    ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);

    // soft magenta haze near top
    const g2 = ctx.createRadialGradient(W*0.6, H*0.3, 20, W*0.6, H*0.3, 400);
    g2.addColorStop(0, 'rgba(255, 80, 180, 0.18)');
    g2.addColorStop(1, 'rgba(255, 80, 180, 0)');
    ctx.fillStyle = g2; ctx.fillRect(0, 0, W, H);

    // distant ruins silhouette (parallax 0.15)
    const offX1 = camX * 0.15;
    ctx.fillStyle = '#1a0f30';
    for (let i = -1; i < 8; i++) {
      const bx = i * 380 - (offX1 % 380);
      // a clump of arches
      ctx.fillRect(bx + 20, H*0.45, 80, H*0.25);
      ctx.fillRect(bx + 130, H*0.40, 60, H*0.30);
      ctx.fillRect(bx + 220, H*0.50, 90, H*0.20);
      // arch top
      ctx.beginPath(); ctx.arc(bx + 60, H*0.45, 40, Math.PI, 0); ctx.fill();
      ctx.beginPath(); ctx.arc(bx + 160, H*0.40, 30, Math.PI, 0); ctx.fill();
    }

    // mid trees (parallax 0.35)
    const offX2 = camX * 0.35;
    for (let i = -1; i < 10; i++) {
      const tx = i * 220 - (offX2 % 220);
      drawTree(tx, H*0.55, 130, '#0a0820', '#1f1145');
    }

    // near trees (parallax 0.6)
    const offX3 = camX * 0.6;
    for (let i = -1; i < 12; i++) {
      const tx = i * 180 - (offX3 % 180);
      drawTree(tx + 40, H*0.62, 110, '#070414', '#150a30');
    }
  }

  function drawTree(x, baseY, h, trunk, foliage) {
    // trunk
    ctx.fillStyle = trunk;
    ctx.fillRect(x - 6, baseY - h*0.3, 12, h*0.3);
    // foliage clusters
    ctx.fillStyle = foliage;
    ctx.beginPath();
    ctx.arc(x, baseY - h*0.5, h*0.30, 0, Math.PI*2);
    ctx.arc(x - h*0.18, baseY - h*0.4, h*0.22, 0, Math.PI*2);
    ctx.arc(x + h*0.18, baseY - h*0.4, h*0.22, 0, Math.PI*2);
    ctx.arc(x, baseY - h*0.7, h*0.25, 0, Math.PI*2);
    ctx.fill();
    // teal highlights
    ctx.fillStyle = 'rgba(60, 180, 200, 0.15)';
    ctx.beginPath(); ctx.arc(x - 6, baseY - h*0.55, h*0.10, 0, Math.PI*2); ctx.fill();
  }

  function drawAmbient() {
    for (const a of ambient) {
      ctx.globalAlpha = Math.min(1, a.life / 200) * 0.85;
      ctx.fillStyle = a.hue;
      ctx.shadowColor = a.hue; ctx.shadowBlur = 8;
      ctx.beginPath(); ctx.arc(a.x, a.y, a.size, 0, Math.PI*2); ctx.fill();
    }
    ctx.shadowBlur = 0; ctx.globalAlpha = 1;
    // sparkle sprite drifting in the foreground occasionally
    const sx = (animT * 0.5) % (W + 200) - 100;
    ctx.globalAlpha = 0.55;
    ctx.drawImage(ASSETS.sparkles, sx, 80 + Math.sin(animT * 0.04) * 20, 90, 78);
    ctx.drawImage(ASSETS.sparkles, (sx + W*0.5) % (W + 200) - 100, 200 + Math.cos(animT * 0.03) * 24, 70, 60);
    ctx.globalAlpha = 1;
  }

  // Tile drawing — uses painted sprites
  function drawTile(s) {
    const x = s.x - camX, y = s.y;
    if (x + s.w < -40 || x > W + 40) return;
    const above = y - TILE;
    const isTop = !solids.some(o => o.x === s.x && o.y === above);

    if (s.type === 'ground') {
      // Below the topmost row, just dark stone fill so the painted top doesn't repeat in the dirt
      if (!isTop) {
        ctx.fillStyle = '#1a1230';
        ctx.fillRect(x, y, s.w, s.h);
        // subtle vertical join
        ctx.fillStyle = 'rgba(0,0,0,0.25)';
        ctx.fillRect(x, y, s.w, 2);
      } else {
        // Top row uses the painted grass block, alternating two variants for variety
        const useAlt = ((s.x / TILE) % 3 === 0) && ASSETS.grass2;
        const img = useAlt ? ASSETS.grass2 : ASSETS.grass1;
        // The painted tile has grass extending above the rect; draw it slightly larger and bottom-anchored.
        const drawW = TILE + 2; // tiny overlap to hide seams
        const drawH = TILE + 8;
        ctx.drawImage(img, x - 1, y - 4, drawW, drawH);
      }
    } else if (s.type === 'brick' || s.type === 'question') {
      // Floating platform: use grass_vines sprite as the visible top
      const b = s.ref || blocks.find(o => o.x === s.x && o.y === s.y);
      const bump = (b && b.bumpT) ? -Math.sin((8 - b.bumpT) / 8 * Math.PI) * 6 : 0;
      ctx.save();
      ctx.translate(0, bump);
      // body: tile dark stone fill
      ctx.fillStyle = '#1a1230';
      ctx.fillRect(x, y + 4, s.w, s.h - 4);
      if (s.type === 'question') {
        // glowing pink ? cube on top of the platform tile
        const glow = b && !b.hit ? Math.sin(animT*0.1) * 0.3 + 0.7 : 0;
        ctx.shadowColor = '#ff6acb'; ctx.shadowBlur = 14 * glow;
        const g = ctx.createLinearGradient(0, y, 0, y + s.h);
        g.addColorStop(0, b && b.hit ? '#5a4a3a' : '#ff8de0');
        g.addColorStop(1, b && b.hit ? '#3a2a1a' : '#a040a0');
        ctx.fillStyle = g; ctx.fillRect(x + 2, y + 2, s.w - 4, s.h - 4);
        ctx.shadowBlur = 0;
        ctx.strokeStyle = '#3a1a3a'; ctx.lineWidth = 2; ctx.strokeRect(x + 2, y + 2, s.w - 4, s.h - 4);
        if (!(b && b.hit)) {
          ctx.fillStyle = '#fff';
          ctx.font = 'bold 26px monospace'; ctx.textAlign='center'; ctx.textBaseline='middle';
          ctx.fillText('?', x + s.w/2, y + s.h/2 + 2);
        }
      } else {
        // brick: paint the grass-vines sprite as the visible top & vines when topmost
        if (isTop) {
          ctx.drawImage(ASSETS.vines, x - 4, y - 6, TILE + 8, TILE + 18);
        } else {
          ctx.fillStyle = '#1a1230';
          ctx.fillRect(x, y, s.w, s.h);
        }
      }
      ctx.restore();
    } else if (s.type === 'pillar') {
      // moss-topped stone pillar: dark stone column + grass top sprite
      ctx.fillStyle = '#1a1230';
      ctx.fillRect(x + 2, y, s.w - 4, s.h);
      ctx.strokeStyle = '#0a0420'; ctx.lineWidth = 2;
      ctx.strokeRect(x + 2, y, s.w - 4, s.h);
      if (isTop) {
        ctx.drawImage(ASSETS.grass1, x - 1, y - 4, TILE + 2, TILE + 8);
      }
    }
  }

  // Vines now drawn into the sprite (grass_vines includes hanging vines).
  // Keep this as a no-op so we don't break the call site.
  function drawVines() {}

  // Decorative grass bushes scattered on top of ground tiles
  function drawDecor() {
    // Place a few bushes deterministically based on tile x to avoid flicker
    for (const s of solids) {
      if (s.type !== 'ground') continue;
      const above = s.y - TILE;
      const isTop = !solids.some(o => o.x === s.x && o.y === above);
      if (!isTop) continue;
      const x = s.x - camX;
      if (x + TILE < 0 || x > W) continue;
      const seed = ((s.x / TILE) * 1303) % 17;
      if (seed === 3) {
        // bush
        ctx.drawImage(ASSETS.bush, x - 6, s.y - TILE + 14, TILE + 12, TILE);
      } else if (seed === 7) {
        // plant
        ctx.drawImage(ASSETS.plant, x + 4, s.y - TILE + 6, TILE - 8, TILE);
      }
    }
  }

  function drawCoin(c) {
    if (c.taken) return;
    const x = c.x - camX, y = c.y;
    if (x < -30 || x > W + 30) return;
    // 2-frame coin spin (alternates ~ every 12 frames)
    const frame = Math.floor((animT + c.t * 5) / 12) % 2;
    const img = frame === 0 ? ASSETS.coin1 : ASSETS.coin2;
    const w = 28, h = 38;
    // bob slightly
    const bob = Math.sin(animT * 0.08 + c.t) * 2;
    ctx.shadowColor = '#ffd54a'; ctx.shadowBlur = 14;
    ctx.drawImage(img, x - w/2, y - h/2 + bob, w, h);
    ctx.shadowBlur = 0;
  }

  function drawEnemy(e) {
    const x = e.x - camX, y = e.y;
    if (x + e.w < 0 || x > W) return;
    if (!e.alive) {
      ctx.fillStyle = '#3a1a4a';
      ctx.fillRect(x, y + e.h - 8, e.w, 8);
      return;
    }
    if (e.type === 'spiky') {
      // glowing pink ground enemy with spikes
      ctx.shadowColor = '#ff3aa8'; ctx.shadowBlur = 14;
      ctx.fillStyle = '#a02080';
      // body
      ctx.beginPath(); ctx.arc(x + e.w/2, y + e.h/2, e.w/2, 0, Math.PI*2); ctx.fill();
      ctx.shadowBlur = 0;
      // pink rim
      ctx.strokeStyle = '#ff5cb8'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(x + e.w/2, y + e.h/2, e.w/2 - 1, 0, Math.PI*2); ctx.stroke();
      // spikes around top
      ctx.fillStyle = '#ff5cb8';
      const cx = x + e.w/2, cy = y + e.h/2, rr = e.w/2;
      for (let i = 0; i < 8; i++) {
        const ang = (i / 8) * Math.PI * 2 - Math.PI/2;
        const px1 = cx + Math.cos(ang - 0.15) * rr;
        const py1 = cy + Math.sin(ang - 0.15) * rr;
        const px2 = cx + Math.cos(ang + 0.15) * rr;
        const py2 = cy + Math.sin(ang + 0.15) * rr;
        const px3 = cx + Math.cos(ang) * (rr + 7);
        const py3 = cy + Math.sin(ang) * (rr + 7);
        ctx.beginPath(); ctx.moveTo(px1, py1); ctx.lineTo(px3, py3); ctx.lineTo(px2, py2); ctx.closePath(); ctx.fill();
      }
      // angry eyes
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(cx - 6, cy - 2, 4, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(cx + 6, cy - 2, 4, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#000';
      ctx.beginPath(); ctx.arc(cx - 6 + (e.vx<0?-1:1), cy - 1, 2, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(cx + 6 + (e.vx<0?-1:1), cy - 1, 2, 0, Math.PI*2); ctx.fill();
    } else if (e.type === 'devil') {
      // floating purple devil with horns and red eyes
      ctx.shadowColor = '#c038ff'; ctx.shadowBlur = 16;
      const cx = x + e.w/2, cy = y + e.h/2;
      ctx.fillStyle = '#5a1880';
      ctx.beginPath(); ctx.arc(cx, cy, e.w/2, 0, Math.PI*2); ctx.fill();
      ctx.shadowBlur = 0;
      // pink rim
      ctx.strokeStyle = '#ff5cb8'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(cx, cy, e.w/2 - 1, 0, Math.PI*2); ctx.stroke();
      // horns
      ctx.fillStyle = '#3a0a55';
      ctx.beginPath();
      ctx.moveTo(cx - 10, cy - e.h/2 + 3); ctx.lineTo(cx - 6, cy - e.h/2 - 12); ctx.lineTo(cx - 2, cy - e.h/2 + 1); ctx.closePath(); ctx.fill();
      ctx.beginPath();
      ctx.moveTo(cx + 2, cy - e.h/2 + 1); ctx.lineTo(cx + 6, cy - e.h/2 - 12); ctx.lineTo(cx + 10, cy - e.h/2 + 3); ctx.closePath(); ctx.fill();
      // glowing red eyes
      ctx.shadowColor = '#ff3030'; ctx.shadowBlur = 8;
      ctx.fillStyle = '#ff3030';
      ctx.beginPath(); ctx.arc(cx - 6, cy, 3.5, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(cx + 6, cy, 3.5, 0, Math.PI*2); ctx.fill();
      ctx.shadowBlur = 0;
      // jagged mouth
      ctx.strokeStyle = '#fff'; ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(cx - 6, cy + 8); ctx.lineTo(cx - 3, cy + 5); ctx.lineTo(cx, cy + 8); ctx.lineTo(cx + 3, cy + 5); ctx.lineTo(cx + 6, cy + 8);
      ctx.stroke();
    }
  }

  function drawPowerup(p) {
    const x = p.x - camX, y = p.y;
    if (x + p.w < 0 || x > W) return;
    ctx.shadowColor = '#ff5cb8'; ctx.shadowBlur = 14;
    ctx.drawImage(ASSETS.gem, x - 2, y - 4, p.w + 4, p.h + 8);
    ctx.shadowBlur = 0;
  }

  // Glowing magenta swirl portal as the goal — uses stone_arch + portal_swirl sprites
  function drawPortalSprite() {
    const x = portalX - camX;
    const groundTop = 440;
    const archW = 100;
    const archH = 170;
    const archBottom = groundTop + 4;
    const archTop = archBottom - archH;
    const innerYc = archTop + archH * 0.42;
    if (x < -120 || x > W + 120) return;

    // outer ambient glow
    const glow = ctx.createRadialGradient(x, innerYc, 4, x, innerYc, 110);
    glow.addColorStop(0, 'rgba(255, 80, 200, 0.45)');
    glow.addColorStop(0.5, 'rgba(255, 60, 180, 0.18)');
    glow.addColorStop(1, 'rgba(255, 60, 180, 0)');
    ctx.fillStyle = glow;
    ctx.fillRect(x - 120, innerYc - 120, 240, 240);

    // animated swirl behind the arch
    const swirlW = archW * 0.55, swirlH = archW * 0.55;
    ctx.save();
    ctx.translate(x, innerYc);
    ctx.rotate(animT * 0.03);
    ctx.shadowColor = '#ff3aa8'; ctx.shadowBlur = 18;
    ctx.drawImage(ASSETS.swirl, -swirlW/2, -swirlH/2, swirlW, swirlH);
    ctx.shadowBlur = 0;
    ctx.restore();

    // stone arch on top
    ctx.drawImage(ASSETS.arch, x - archW/2, archTop, archW, archH);

    // little particles drawn around it
    for (let i = 0; i < 4; i++) {
      const t = (animT * 0.05 + i * 1.5) % (Math.PI * 2);
      const r = 40 + Math.sin(t * 2) * 12;
      const px = x + Math.cos(t) * r;
      const py = innerYc + Math.sin(t) * r * 0.5;
      ctx.fillStyle = 'rgba(255, 180, 230, 0.85)';
      ctx.beginPath(); ctx.arc(px, py, 1.8, 0, Math.PI*2); ctx.fill();
    }
  }
  function drawPortal() { drawPortalSprite(); }
  // legacy procedural portal kept inline below in case we ever want to fall back
  function _drawPortalOld() {
    const x = portalX - camX;
    const groundTop = 440;
    const archW = 70;
    const archH = 110;
    const archBottom = groundTop;
    const archTop = archBottom - archH;
    const yc = (archTop + archBottom) / 2;
    if (x < -120 || x > W + 120) return;

    // ---- Outer ambient glow behind the portal (radial)
    const outerGlow = ctx.createRadialGradient(x, yc, 4, x, yc, 90);
    outerGlow.addColorStop(0, 'rgba(255, 80, 200, 0.45)');
    outerGlow.addColorStop(0.5, 'rgba(255, 60, 180, 0.18)');
    outerGlow.addColorStop(1, 'rgba(255, 60, 180, 0)');
    ctx.fillStyle = outerGlow;
    ctx.fillRect(x - 100, yc - 100, 200, 200);

    // ---- Stone arch frame (outer)
    ctx.fillStyle = '#2a1845';
    // sides
    ctx.fillRect(x - archW/2, archTop + 22, 12, archH - 22);
    ctx.fillRect(x + archW/2 - 12, archTop + 22, 12, archH - 22);
    // top arch
    ctx.beginPath();
    ctx.moveTo(x - archW/2, archTop + 22);
    ctx.arc(x, archTop + 22, archW/2, Math.PI, 0);
    ctx.lineTo(x + archW/2, archTop);
    ctx.arc(x, archTop, archW/2, 0, Math.PI, true);
    ctx.closePath();
    ctx.fill();
    // base stones
    ctx.fillStyle = '#1a0e30';
    ctx.fillRect(x - archW/2 - 8, archBottom - 14, archW + 16, 14);
    // brick lines on the arch
    ctx.strokeStyle = '#1a0a30'; ctx.lineWidth = 1;
    for (let i = 0; i < 5; i++) {
      const py = archTop + 30 + i * 16;
      ctx.beginPath(); ctx.moveTo(x - archW/2 + 2, py); ctx.lineTo(x - archW/2 + 12, py); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(x + archW/2 - 12, py); ctx.lineTo(x + archW/2 - 2, py); ctx.stroke();
    }

    // ---- Swirl interior (clipped to the inner arch shape)
    ctx.save();
    ctx.beginPath();
    const innerW = archW - 24;
    const innerH = archH - 26;
    const innerTop = archTop + 18;
    const innerBottom = archBottom - 6;
    ctx.moveTo(x - innerW/2, innerBottom);
    ctx.lineTo(x - innerW/2, innerTop + innerW/2);
    ctx.arc(x, innerTop + innerW/2, innerW/2, Math.PI, 0);
    ctx.lineTo(x + innerW/2, innerBottom);
    ctx.closePath();
    ctx.clip();

    // background of the portal interior
    const innerYc = (innerTop + innerBottom) / 2;
    const innerGlow = ctx.createRadialGradient(x, innerYc, 4, x, innerYc, innerH/1.4);
    innerGlow.addColorStop(0, '#fff5ff');
    innerGlow.addColorStop(0.2, '#ff8de0');
    innerGlow.addColorStop(0.7, '#a020a0');
    innerGlow.addColorStop(1, '#3a0a3a');
    ctx.fillStyle = innerGlow;
    ctx.fillRect(x - innerW, innerTop - 10, innerW*2, innerH + 20);

    // swirling spiral arms
    ctx.translate(x, innerYc);
    ctx.rotate(animT * 0.05);
    for (let i = 0; i < 4; i++) {
      const ang = (i / 4) * Math.PI * 2;
      ctx.save();
      ctx.rotate(ang);
      ctx.fillStyle = `rgba(255, 200, 240, ${0.55 - i*0.05})`;
      ctx.beginPath();
      ctx.moveTo(0, 0);
      // spiral arm using a curve outward
      ctx.quadraticCurveTo(innerW*0.3, -innerH*0.1, innerW*0.6, -innerH*0.05);
      ctx.quadraticCurveTo(innerW*0.4, innerH*0.1, 0, 4);
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    }

    // bright core
    ctx.fillStyle = '#ffffff';
    ctx.shadowColor = '#ff6acb'; ctx.shadowBlur = 30;
    ctx.beginPath(); ctx.arc(0, 0, 8, 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0;

    ctx.restore();

    // little floating particles sucked into the portal
    for (let i = 0; i < 5; i++) {
      const t = (animT * 0.05 + i * 1.2) % (Math.PI * 2);
      const r = 30 + Math.sin(t * 2) * 10;
      const px = x + Math.cos(t) * r;
      const py = innerYc + Math.sin(t) * r * 0.6;
      ctx.fillStyle = 'rgba(255, 180, 230, 0.8)';
      ctx.beginPath(); ctx.arc(px, py, 1.5, 0, Math.PI*2); ctx.fill();
    }
  }

  // Wood signpost at the start — uses sign sprite
  function drawSign() {
    const x = startX + 60 - camX;
    const baseY = 440;  // ground top
    if (x < -50 || x > W + 50) return;
    const w = 50, h = 62;
    ctx.drawImage(ASSETS.sign, x - w/2, baseY - h, w, h);
  }

  // Pick the right animation frame based on player state
  function getPlayerFrame() {
    if (player.invuln > 30) return ASSETS.hurt;
    if (!player.onGround) {
      // jump arc: rising = jump1/2, peak = jump2, falling = jump3
      if (player.vy < -3) return ASSETS.jump1;
      if (player.vy < 3)  return ASSETS.jump2;
      return ASSETS.jump3;
    }
    if (Math.abs(player.vx) > 0.5) {
      // run cycle, faster when running faster
      const speed = Math.min(1, Math.abs(player.vx) / MAX_RUN);
      const t = Math.floor(animT * (0.18 + 0.18 * speed)) % 3;
      return [ASSETS.run1, ASSETS.run2, ASSETS.run3][t];
    }
    // idle 2-frame breathing
    return Math.floor(animT * 0.05) % 2 === 0 ? ASSETS.idle1 : ASSETS.idle2;
  }

  function drawPlayer() {
    const x = player.x - camX, y = player.y;
    if (player.invuln > 0 && player.invuln <= 30 && Math.floor(player.invuln/3) % 2 === 0) return;
    const img = getPlayerFrame();
    if (!img || !img.width) return;
    // Crop the bottom ~16% of the source sprite to remove the pink magical ring under the feet.
    const sx = 0, sy = 0;
    const sw = img.width;
    const sh = Math.floor(img.height * 0.84);
    // Scale so character height is roughly 1.85x player.h, keep aspect ratio
    const targetH = player.h * 1.55;
    const aspect = sw / sh;
    const targetW = targetH * aspect;
    const dx = x + player.w/2 - targetW/2;
    const dy = y + player.h - targetH; // bottom-aligned
    ctx.save();
    if (player.facing < 0) {
      ctx.translate(dx + targetW, dy);
      ctx.scale(-1, 1);
      ctx.drawImage(img, sx, sy, sw, sh, 0, 0, targetW, targetH);
    } else {
      ctx.drawImage(img, sx, sy, sw, sh, dx, dy, targetW, targetH);
    }
    ctx.restore();
  }

  function drawRings() {
    for (const r of rings) {
      const alpha = Math.max(0, r.life / r.maxLife) * 0.7;
      ctx.globalAlpha = alpha;
      ctx.strokeStyle = r.color;
      ctx.lineWidth = 2.5 * (r.life / r.maxLife);
      ctx.shadowColor = r.color; ctx.shadowBlur = 12;
      ctx.beginPath();
      ctx.ellipse(r.x - camX, r.y, r.r, r.r * 0.45, 0, 0, Math.PI * 2);
      ctx.stroke();
      ctx.shadowBlur = 0;
    }
    ctx.globalAlpha = 1;
  }

  function drawPopCoins() {
    for (const pc of popCoins) {
      const x = pc.x - camX, y = pc.y;
      if (x < -20 || x > W + 20) continue;
      const frame = Math.floor(pc.t / 4) % 2;
      const img = frame === 0 ? ASSETS.coin1 : ASSETS.coin2;
      const w = 24, h = 32;
      ctx.globalAlpha = Math.max(0, Math.min(1, pc.life / 30));
      ctx.shadowColor = '#ffd54a'; ctx.shadowBlur = 14;
      ctx.drawImage(img, x - w/2, y - h/2, w, h);
      ctx.shadowBlur = 0;
      ctx.globalAlpha = 1;
    }
  }

  function drawParticles() {
    for (const p of particles) {
      ctx.globalAlpha = Math.max(0, p.life/30);
      if (p.sprite === 'dust') {
        const sz = p.size || 28;
        ctx.drawImage(ASSETS.dust, p.x - camX - sz/2, p.y - sz/2, sz, sz * 0.8);
      } else {
        ctx.fillStyle = p.color;
        ctx.fillRect(p.x - camX - 2, p.y - 2, 4, 4);
      }
    }
    ctx.globalAlpha = 1;
  }

  // ---------- HUD (drawn on canvas) ----------
  function drawHud() {
    // panel backdrop
    ctx.fillStyle = 'rgba(10, 5, 25, 0.65)';
    ctx.beginPath();
    roundRect(10, 10, 220, 56, 14);
    ctx.fill();
    ctx.strokeStyle = 'rgba(255, 92, 184, 0.5)'; ctx.lineWidth = 1.5; ctx.stroke();

    // mini player face avatar — uses idle1 sprite, clipped to a circle
    ctx.save();
    ctx.beginPath(); ctx.arc(36, 36, 20, 0, Math.PI*2); ctx.clip();
    // dark fill behind
    ctx.fillStyle = '#1a0a30'; ctx.fillRect(16, 16, 40, 40);
    if (ASSETS.idle1.width) {
      // crop face area: roughly upper 60% of sprite
      const img = ASSETS.idle1;
      ctx.drawImage(img, 0, 0, img.width, img.height * 0.7,  16, 14, 40, 44);
    }
    ctx.restore();
    ctx.strokeStyle = '#ff5cb8'; ctx.lineWidth = 2;
    ctx.shadowColor = '#ff5cb8'; ctx.shadowBlur = 8;
    ctx.beginPath(); ctx.arc(36, 36, 20, 0, Math.PI*2); ctx.stroke();
    ctx.shadowBlur = 0;

    // hearts
    const maxLives = 3;
    for (let i = 0; i < maxLives; i++) {
      const hx = 70 + i * 22, hy = 24;
      drawHeart(hx, hy, 9, i < player.lives ? '#ff3a6a' : 'rgba(255,255,255,0.2)');
    }

    // orb icon + coin count
    ctx.shadowColor = '#9cd6ff'; ctx.shadowBlur = 10;
    ctx.drawImage(ASSETS.orb, 70, 42, 18, 18);
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 14px system-ui, sans-serif';
    ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
    ctx.fillText('x ' + player.coins, 94, 51);
  }

  function drawHeart(cx, cy, r, color) {
    ctx.shadowColor = color === 'rgba(255,255,255,0.2)' ? 'transparent' : '#ff3a6a';
    ctx.shadowBlur = 6;
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.moveTo(cx, cy + r*0.6);
    ctx.bezierCurveTo(cx, cy, cx - r, cy, cx - r, cy - r*0.3);
    ctx.bezierCurveTo(cx - r, cy - r, cx, cy - r*0.7, cx, cy - r*0.2);
    ctx.bezierCurveTo(cx, cy - r*0.7, cx + r, cy - r, cx + r, cy - r*0.3);
    ctx.bezierCurveTo(cx + r, cy, cx, cy, cx, cy + r*0.6);
    ctx.fill();
    ctx.shadowBlur = 0;
  }

  function roundRect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x+r, y);
    ctx.lineTo(x+w-r, y); ctx.quadraticCurveTo(x+w, y, x+w, y+r);
    ctx.lineTo(x+w, y+h-r); ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
    ctx.lineTo(x+r, y+h); ctx.quadraticCurveTo(x, y+h, x, y+h-r);
    ctx.lineTo(x, y+r); ctx.quadraticCurveTo(x, y, x+r, y);
    ctx.closePath();
  }

  // ----- Loading screen -----
  function drawLoading() {
    ctx.fillStyle = '#0a0716'; ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 18px system-ui, sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('Loading… ' + assetsLoaded + ' / ' + assetsTotal, W/2, H/2 - 20);
    // progress bar
    const pw = 240, ph = 8;
    ctx.fillStyle = 'rgba(255,255,255,0.15)'; ctx.fillRect(W/2 - pw/2, H/2 + 10, pw, ph);
    ctx.fillStyle = '#ff5cb8'; ctx.shadowColor = '#ff5cb8'; ctx.shadowBlur = 10;
    ctx.fillRect(W/2 - pw/2, H/2 + 10, pw * (assetsLoaded / assetsTotal), ph);
    ctx.shadowBlur = 0;
  }

  // ----- Frame -----
  function frame() {
    if (!allAssetsReady()) {
      drawLoading();
      requestAnimationFrame(frame);
      return;
    }
    update();
    drawSky();
    drawAmbient();
    drawSign();
    for (const s of solids) drawTile(s);
    drawDecor();
    drawPortal();
    for (const c of coins) drawCoin(c);
    drawPopCoins();
    for (const p of powerups) drawPowerup(p);
    for (const e of enemies) drawEnemy(e);
    drawPlayer();
    drawRings();
    drawParticles();
    drawHud();
    requestAnimationFrame(frame);
  }

  function showMsg(t) {
    const el = document.getElementById('msg');
    el.textContent = t; el.classList.add('show');
  }
  function hideMsg() { document.getElementById('msg').classList.remove('show'); }

  frame();
})();
</script>
</body>
</html>
