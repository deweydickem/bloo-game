<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bloo</title>
<style>
/* ===== GLOBAL ===== */
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: url("/background.png") no-repeat center center fixed;
  background-size: cover;
  overflow: hidden;
  color: white;
}
/* dark overlay for readability */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 20, 0.35);
  z-index: 0;
}
/* ===== CONTENT ===== */
.container {
  position: relative;
  z-index: 2;
  padding: 60px;
  max-width: 600px;
}
/* ===== TITLE ===== */
h1 {
  font-size: 64px;
  margin-bottom: 10px;
}
/* ===== BUTTONS ===== */
.button {
  display: inline-block;
  padding: 12px 24px;
  margin: 10px 10px 0 0;
  border-radius: 10px;
  background: #ff4df0;
  color: white;
  text-decoration: none;
  font-weight: bold;
  box-shadow: 0 0 15px #ff4df0;
  transition: 0.2s ease;
}
.button:hover {
  transform: scale(1.05);
  box-shadow: 0 0 25px #ff4df0;
}
/* ===== CHARACTER ===== */
.character {
  position: absolute;
  bottom: 40px;
  right: 40px;
  width: 220px;
  animation: glowPulse 3s infinite ease-in-out;
}
@keyframes glowPulse {
  0% { filter: drop-shadow(0 0 10px #ff4df0); }
  50% { filter: drop-shadow(0 0 30px #ff4df0); }
  100% { filter: drop-shadow(0 0 10px #ff4df0); }
}
/* ===== PARTICLES ===== */
.particle {
  position: absolute;
  width: 4px;
  height: 4px;
  background: #ff4df0;
  border-radius: 50%;
  opacity: 0.7;
  animation: float 6s infinite ease-in-out;
}
@keyframes float {
  0% { transform: translateY(0px); opacity: 0.4; }
  50% { transform: translateY(-30px); opacity: 1; }
  100% { transform: translateY(0px); opacity: 0.4; }
}
</style>
</head>
<body>
<div class="container">
  <h1>bloo</h1>
  <p>something is coming</p>
  <a href="#" class="button">buy</a>
  <a href="#" class="button">about</a>
</div>
<!-- CHARACTER IMAGE -->
<img src="/bloo.png" class="character" />
<!-- PARTICLES -->
<script>
for (let i = 0; i < 40; i++) {
  const p = document.createElement("div");
  p.className = "particle";
  p.style.left = Math.random() * 100 + "vw";
  p.style.top = Math.random() * 100 + "vh";
  p.style.animationDuration = (4 + Math.random() * 4) + "s";
  document.body.appendChild(p);
}
</script>
</body>
</html>
