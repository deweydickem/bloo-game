<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#0a0716" />
<title>Bloo Arcade</title>
<style>
  :root {
    --bg-1: #0a0716;
    --pink: #ff5cb8;
    --pink-2: #ff8de0;
    --cyan: #9cd6ff;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg-1); color: #fff; font-family: system-ui, -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; height: 100%; overflow: hidden; }
  body {
    height: 100vh;
    display: grid;
    grid-template-rows: auto 1fr auto;
    padding: 20px 16px;
    box-sizing: border-box;
    position: relative;
  }

  /* ---- Painted background — fills the entire viewport ---- */
  .bg {
    position: fixed; inset: 0;
    background-image: url('bg.png');
    background-size: cover;
    background-position: center center;
    background-repeat: no-repeat;
    z-index: -2;
  }
  /* Very light vignette only at the very top and very bottom — leave the middle clean */
  .bg::after {
    content: ""; position: absolute; inset: 0;
    background:
      linear-gradient(180deg, rgba(10, 7, 22, 0.55) 0%, rgba(10, 7, 22, 0) 18%, rgba(10, 7, 22, 0) 70%, rgba(10, 7, 22, 0.55) 100%);
    pointer-events: none;
  }

  /* ---- Header ---- */
  header { text-align: center; position: relative; z-index: 1; padding-top: 6px; }
  h1 {
    margin: 0; font-size: clamp(34px, 6vw, 60px); font-weight: 800; letter-spacing: 1px;
    background: linear-gradient(180deg, #fff 0%, var(--pink-2) 50%, var(--pink) 100%);
    -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
    animation: titleGlow 4s ease-in-out infinite;
  }
  @keyframes titleGlow {
    0%, 100% { filter: drop-shadow(0 0 14px rgba(255, 92, 184, 0.5)) drop-shadow(0 4px 8px rgba(0,0,0,0.7)); }
    50%      { filter: drop-shadow(0 0 26px rgba(255, 92, 184, 0.85)) drop-shadow(0 4px 8px rgba(0,0,0,0.7)); }
  }
  .subtitle {
    color: #fff; margin-top: 4px; font-size: 12px; letter-spacing: 1.2px; text-transform: uppercase;
    text-shadow: 0 0 12px rgba(255, 92, 184, 0.5), 0 2px 4px rgba(0,0,0,0.7);
    opacity: 0.85;
  }

  /* ---- Middle stays empty so the painting shines ---- */
  .spacer { position: relative; z-index: 0; }

  /* ---- Compact card strip at the bottom ---- */
  .grid {
    display: grid; gap: 14px;
    grid-template-columns: repeat(auto-fit, minmax(200px, 280px));
    justify-content: center;
    position: relative; z-index: 1;
    padding: 0 4px 6px;
    max-width: 1100px; margin: 0 auto; width: 100%;
  }
  .card {
    position: relative;
    border-radius: 14px;
    overflow: hidden;
    background: rgba(20, 8, 40, 0.55);
    border: 1.5px solid rgba(255, 92, 184, 0.35);
    box-shadow: 0 10px 26px rgba(0,0,0,.55), 0 0 22px rgba(255, 92, 184, 0.18);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    text-decoration: none; color: #fff;
    transition: transform .2s ease, box-shadow .2s ease, border-color .2s ease;
    cursor: pointer;
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px;
  }
  .card:hover, .card:focus {
    transform: translateY(-3px);
    box-shadow: 0 16px 36px rgba(0,0,0,.7), 0 0 38px rgba(255, 92, 184, 0.4);
    border-color: rgba(255, 92, 184, 0.7);
    outline: none;
  }
  .card:active { transform: translateY(-1px); }

  .icon {
    width: 50px; height: 50px; flex: 0 0 50px;
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }
  .icon-platformer { background: linear-gradient(135deg, #2a134a 0%, #0f0820 100%); }
  .icon-tower      { background: linear-gradient(135deg, #2a1845 0%, #c038ff 130%); }
  .icon-runner     { background: linear-gradient(135deg, #1a0e30 0%, #ff5cb8 160%); }
  .icon svg { width: 100%; height: 100%; }

  .info { display: flex; flex-direction: column; gap: 2px; min-width: 0; flex: 1; }
  .row { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .game-title { font-size: 15px; font-weight: 700; margin: 0; letter-spacing: .2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .badge {
    font-size: 9px; padding: 2px 7px; border-radius: 999px; line-height: 1.4;
    background: rgba(255, 92, 184, 0.18); color: var(--pink-2);
    border: 1px solid rgba(255, 92, 184, 0.4);
    letter-spacing: .5px; flex: 0 0 auto;
  }
  .badge.new { background: rgba(156, 214, 255, 0.18); color: var(--cyan); border-color: rgba(156, 214, 255, 0.4); }
  .desc { color: rgba(255,255,255,0.6); font-size: 11px; line-height: 1.35; margin: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .play {
    background: linear-gradient(135deg, var(--pink) 0%, #c038ff 100%);
    color: #fff; font-weight: 700; font-size: 11px; letter-spacing: .8px;
    padding: 6px 12px; border-radius: 999px; flex: 0 0 auto;
    box-shadow: 0 4px 12px rgba(255, 92, 184, 0.4);
    transition: transform .15s ease;
  }
  .card:hover .play { transform: translateX(3px); }

  footer {
    color: rgba(255, 255, 255, 0.7);
    font-size: 11px; text-align: center; position: relative; z-index: 1;
    text-shadow: 0 1px 4px rgba(0,0,0,0.7);
    margin-top: 8px;
  }
  footer a { color: var(--pink-2); text-decoration: none; }
  footer a:hover { text-decoration: underline; }

  @media (max-width: 600px) {
    .grid { grid-template-columns: 1fr; gap: 10px; }
    body { padding: 14px 12px; }
  }
</style>
</head>
<body>
  <div class="bg" aria-hidden="true"></div>

  <header>
    <h1>Bloo Arcade</h1>
    <div class="subtitle">A growing collection of mini-games</div>
  </header>

  <div class="spacer"></div>

  <div class="grid">
    <a class="card" href="game.html" aria-label="Play Forest of Embers">
      <div class="icon icon-platformer">
        <svg viewBox="0 0 50 50" xmlns="http://www.w3.org/2000/svg">
          <rect x="0" y="38" width="50" height="12" fill="#1b8a40"/>
          <g transform="translate(25, 28)">
            <ellipse cx="0" cy="0" rx="10" ry="10" fill="#ff5cb8" opacity="0.25"/>
            <path d="M -5 0 Q -4 -10 -1 -4 Q 0 -13 2 -4 Q 5 -10 6 0 Z" fill="#ff5cb8"/>
            <circle cx="0" cy="0" r="7" fill="#1f6fd1"/>
            <circle cx="-2" cy="-1" r="1.5" fill="#fff"/>
            <circle cx="2" cy="-1" r="1.5" fill="#fff"/>
          </g>
        </svg>
      </div>
      <div class="info">
        <div class="row">
          <h2 class="game-title">Forest of Embers</h2>
          <span class="badge">3 LV</span>
        </div>
        <p class="desc">Side-scrolling platformer · run, jump, dodge spikes</p>
      </div>
      <span class="play">PLAY</span>
    </a>

    <a class="card" href="tower.html" aria-label="Play Bloo Defense">
      <div class="icon icon-tower">
        <svg viewBox="0 0 50 50" xmlns="http://www.w3.org/2000/svg">
          <rect x="0" y="38" width="50" height="12" fill="#3a2a55"/>
          <path d="M 25 5 L 25 18 L 12 18 L 12 32 L 38 32 L 38 42" stroke="rgba(255,92,184,0.7)" stroke-width="3" fill="none" stroke-linecap="round"/>
          <circle cx="14" cy="26" r="6" fill="#ff8a3a"/>
          <circle cx="36" cy="26" r="6" fill="#9cd6ff"/>
          <circle cx="36" cy="14" r="6" fill="#c46cff"/>
        </svg>
      </div>
      <div class="info">
        <div class="row">
          <h2 class="game-title">Bloo Defense</h2>
          <span class="badge new">NEW</span>
        </div>
        <p class="desc">Tower defense · 8 towers, endless waves</p>
      </div>
      <span class="play">PLAY</span>
    </a>

    <a class="card" href="runner.html" aria-label="Play Crowd Runner">
      <div class="icon icon-runner">
        <svg viewBox="0 0 50 50" xmlns="http://www.w3.org/2000/svg">
          <polygon points="18,0 32,0 42,50 8,50" fill="rgba(20, 8, 40, 0.5)"/>
          <line x1="18" y1="0" x2="8" y2="50" stroke="rgba(255,92,184,0.55)" stroke-width="1.5"/>
          <line x1="32" y1="0" x2="42" y2="50" stroke="rgba(255,92,184,0.55)" stroke-width="1.5"/>
          <rect x="12" y="14" width="13" height="9" fill="rgba(80,255,140,0.4)" stroke="#5fe87a" stroke-width="1" rx="2"/>
          <rect x="25" y="14" width="13" height="9" fill="rgba(255,90,140,0.35)" stroke="#ff5c8a" stroke-width="1" rx="2"/>
          <g transform="translate(25, 40)">
            <circle cx="-6" cy="0" r="3" fill="#1f6fd1" stroke="#ff5cb8" stroke-width="1"/>
            <circle cx="0" cy="-2" r="4" fill="#1f6fd1" stroke="#ff5cb8" stroke-width="1"/>
            <circle cx="6" cy="0" r="3" fill="#1f6fd1" stroke="#ff5cb8" stroke-width="1"/>
          </g>
        </svg>
      </div>
      <div class="info">
        <div class="row">
          <h2 class="game-title">Crowd Runner</h2>
          <span class="badge new">NEW</span>
        </div>
        <p class="desc">Endless auto-shooter · multiplier gates, bosses</p>
      </div>
      <span class="play">PLAY</span>
    </a>
  </div>

  <footer>
    <a href="https://github.com/deweydickem/bloo-game" target="_blank" rel="noopener">source</a>
  </footer>
</body>
</html>
