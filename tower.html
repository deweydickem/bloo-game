<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#0a0716" />
<title>Bloo Defense — Bloo Arcade</title>
<style>
  html, body { margin:0; padding:0; background:#0a0716; color:#fff; font-family: system-ui, sans-serif; height:100%; overflow:hidden; touch-action: none; -webkit-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent; overscroll-behavior: none; }
  #wrap { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; }
  canvas {
    background:#0a0716;
    box-shadow:0 0 60px rgba(255, 60, 170, 0.25), 0 12px 40px rgba(0,0,0,.7);
    border-radius:8px;
    width: min(100vw, calc(100vh * 9 / 16));
    height: min(100vh, calc(100vw * 16 / 9));
    display:block;
  }
  #btn-back, #btn-mute {
    position: fixed; top: max(14px, env(safe-area-inset-top));
    padding: 6px 12px; border-radius: 999px;
    background: rgba(20, 8, 40, 0.55); border: 1.5px solid rgba(255, 92, 184, 0.45);
    color: #fff; font-size: 12px; letter-spacing: .5px; font-weight: 600;
    text-decoration: none; cursor: pointer; z-index: 11;
    backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
  }
  #btn-back { left: max(14px, env(safe-area-inset-left)); }
  #btn-mute { right: max(14px, env(safe-area-inset-right)); width: 38px; height: 38px; padding: 0; border-radius: 50%; font-size: 18px; display:flex; align-items:center; justify-content:center; }
  #btn-board { right: calc(max(14px, env(safe-area-inset-right)) + 48px); width: 38px; height: 38px; padding: 0; border-radius: 50%; font-size: 17px; display:flex; align-items:center; justify-content:center; text-decoration: none; }
</style>
</head>
<body>
<div id="wrap"><canvas id="c" width="540" height="960"></canvas></div>
<a id="btn-back" href="index.html">‹ MENU</a>
<a id="btn-board" href="leaderboard.html" title="Leaderboard">🏆</a>
<div id="btn-mute" title="Mute (M)">🔊</div>
<script src="leaderboard.js"></script>

<script>
(() => {
  // ============================================================================
  // SETUP & AUDIO
  // ============================================================================
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  ctx.imageSmoothingEnabled = true;
  const W = canvas.width, H = canvas.height;

  const Audio = (() => {
    let actx = null, master = null, muted = false;
    try { muted = localStorage.getItem('bloo.muted') === '1'; } catch(_) {}
    function ensure() {
      if (typeof window === 'undefined') return null;
      const AC = window.AudioContext || window.webkitAudioContext; if (!AC) return null;
      if (!actx) { actx = new AC(); master = actx.createGain(); master.gain.value = muted ? 0 : 0.5; master.connect(actx.destination); }
      if (actx.state === 'suspended') actx.resume();
      return actx;
    }
    addEventListener('keydown', ensure, { once: true });
    addEventListener('pointerdown', ensure, { once: true });
    addEventListener('touchstart', ensure, { once: true });
    function setMuted(m) { muted = m; if (master) master.gain.value = muted ? 0 : 0.5; try { localStorage.setItem('bloo.muted', muted ? '1' : '0'); } catch(_) {} }
    function isMuted() { return muted; }
    function tone(f, dur, type, opts={}){
      const c = ensure(); if (!c || muted) return;
      const t = c.currentTime; const o = c.createOscillator(); const g = c.createGain();
      o.type = type; o.frequency.setValueAtTime(f, t);
      if (opts.freqEnd) o.frequency.exponentialRampToValueAtTime(Math.max(40, opts.freqEnd), t + dur);
      const peak = opts.gain ?? 0.12;
      g.gain.setValueAtTime(0.0001, t);
      g.gain.exponentialRampToValueAtTime(peak, t + 0.005);
      g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
      o.connect(g).connect(master); o.start(t); o.stop(t + dur + 0.05);
    }
    function noise(dur, opts={}){
      const c = ensure(); if (!c || muted) return;
      const t = c.currentTime; const len = Math.floor(c.sampleRate * dur);
      const buf = c.createBuffer(1, len, c.sampleRate); const d = buf.getChannelData(0);
      for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
      const src = c.createBufferSource(); src.buffer = buf;
      const f = c.createBiquadFilter(); f.type = opts.filterType || 'bandpass'; f.frequency.value = opts.freq || 600; f.Q.value = opts.Q ?? 1;
      const g = c.createGain(); const peak = opts.gain ?? 0.1;
      g.gain.setValueAtTime(0.0001, t); g.gain.exponentialRampToValueAtTime(peak, t + 0.003); g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
      src.connect(f).connect(g).connect(master); src.start(t); src.stop(t + dur + 0.05);
    }
    return {
      ensure, setMuted, isMuted,
      place()    { tone(660, 0.10, 'triangle', { gain: 0.18 }); setTimeout(()=>tone(880,0.12,'triangle',{gain:0.14}),60); },
      cantPlace(){ tone(220, 0.18, 'sawtooth', { freqEnd: 110, gain: 0.16 }); },
      blaster()  { tone(720, 0.05, 'square', { freqEnd: 1200, gain: 0.04 }); },
      cannon()   { tone(180, 0.10, 'sawtooth', { freqEnd: 60, gain: 0.10 }); noise(0.08,{freq:200,gain:0.08}); },
      lightning(){ tone(1200, 0.08, 'square', { freqEnd: 500, gain: 0.05 }); noise(0.06,{freq:1200,gain:0.04}); },
      pulse()    { tone(340, 0.16, 'sine', { freqEnd: 660, gain: 0.10 }); noise(0.10,{freq:600,gain:0.05}); },
      ice()      { tone(980, 0.08, 'sine',   { freqEnd: 1400, gain: 0.05 }); },
      plasma()   { tone(440, 0.12, 'sine',   { freqEnd: 880, gain: 0.08 }); noise(0.06,{freq:800,gain:0.04}); },
      missile()  { noise(0.18,{freq:300,freqEnd:60,gain:0.10}); tone(440, 0.20, 'sawtooth',{freqEnd:120, gain:0.05}); },
      enemyDie() { noise(0.16, { freq: 240, freqEnd: 80, gain: 0.14 }); },
      reachGoal(){ tone(180, 0.20, 'sawtooth', { gain: 0.16 }); },
      waveStart(){ tone(440, 0.08, 'triangle', { gain: 0.16 }); setTimeout(()=>tone(660,0.10,'triangle',{gain:0.16}),80); },
      win()      { [523,659,784,1047,1319].forEach((f,i)=>setTimeout(()=>tone(f,0.22,'triangle',{gain:0.18}),i*120)); },
      lose()     { [440,370,311,247,196].forEach((f,i)=>setTimeout(()=>tone(f,0.22,'triangle',{gain:0.18}),i*120)); },
    };
  })();

  // ============================================================================
  // PAINTED ASSETS
  // ============================================================================
  const ASSET_LIST = {
    // Towers
    t_blaster:   'sprites/td/towers/tower_basic_blaster.png',
    t_cannon:    'sprites/td/towers/tower_cannon.png',
    t_lightning: 'sprites/td/towers/tower_lightning.png',
    t_pulse:     'sprites/td/towers/tower_aoe_pulse.png',
    t_ice:       'sprites/td/towers/tower_ice.png',
    t_plasma:    'sprites/td/towers/tower_plasma.png',
    t_missile:   'sprites/td/towers/tower_missile.png',
    t_aura:      'sprites/td/towers/tower_support_aura.png',
    // Enemies
    e_basic:     'sprites/td/enemies/enemy_basic.png',
    e_fast:      'sprites/td/enemies/enemy_fast.png',
    e_tank:      'sprites/td/enemies/enemy_tank.png',
    e_flying:    'sprites/td/enemies/enemy_flying.png',
    e_shielded:  'sprites/td/enemies/enemy_shielded.png',
    e_healer:    'sprites/td/enemies/enemy_healer.png',
    e_summoner:  'sprites/td/enemies/enemy_summoner.png',
    e_boss:      'sprites/td/enemies/enemy_boss.png',
    // Projectiles
    p_shot:      'sprites/td/projectiles/proj_basic_shot.png',
    p_laser:     'sprites/td/projectiles/proj_laser.png',
    p_chain:     'sprites/td/projectiles/proj_chain_lightning.png',
    p_missile:   'sprites/td/projectiles/proj_missile.png',
    p_ice:       'sprites/td/projectiles/proj_ice_shard.png',
    p_plasma:    'sprites/td/projectiles/proj_plasma_ball.png',
    // Effects
    fx_hit:      'sprites/td/effects/effect_hit.png',
    fx_explosion:'sprites/td/effects/effect_explosion.png',
    fx_ice:      'sprites/td/effects/effect_ice_explosion.png',
    fx_slow:     'sprites/td/effects/effect_slow_field.png',
    fx_crit:     'sprites/td/effects/effect_crit.png',
    // Tiles & decor
    tile_grass:  'sprites/td/tiles/tile_grass.png',
    tile_path:   'sprites/td/tiles/tile_path.png',
    tile_corner: 'sprites/td/tiles/tile_corner.png',
    tile_cross:  'sprites/td/tiles/tile_crossroads.png',
    tile_portal: 'sprites/td/tiles/tile_portal.png',
    tile_base:   'sprites/td/tiles/tile_base.png',
    tile_rock:   'sprites/td/tiles/tile_rock.png',
    tile_tree:   'sprites/td/tiles/tile_tree.png',
    tile_bush:   'sprites/td/tiles/tile_bush.png',
    // UI
    u_heart:     'sprites/td/ui/ui_heart.png',
    u_orb:       'sprites/td/ui/ui_currency_orb.png',
    u_gem:       'sprites/td/ui/ui_gem.png',
    u_wave:      'sprites/td/ui/ui_wave_icon.png',
    u_play:      'sprites/td/ui/ui_play.png',
    u_pause:     'sprites/td/ui/ui_pause.png',
    u_speed:     'sprites/td/ui/ui_speed_up.png',
    u_locked:    'sprites/td/ui/ui_locked.png',
  };
  const ASSETS = {};
  let assetsLoaded = 0; const assetsTotal = Object.keys(ASSET_LIST).length;
  for (const [k, src] of Object.entries(ASSET_LIST)) {
    const img = new Image();
    img.onload  = () => { assetsLoaded++; };
    img.onerror = () => { assetsLoaded++; img._failed = true; };
    img.src = src;
    ASSETS[k] = img;
  }
  function ready() { return assetsLoaded >= assetsTotal; }
  function ok(k) { return ASSETS[k] && ASSETS[k].width && !ASSETS[k]._failed; }

  // ============================================================================
  // GRID
  // ============================================================================
  const TILE = 45;
  const COLS = Math.floor(W / TILE);              // 12
  const ROWS = Math.floor((H - 220) / TILE);      // ~16
  const GRID_X = Math.floor((W - COLS * TILE) / 2);
  const GRID_Y = 110;

  // 0=empty (grass), 1=tower, 2=blocked decoration, 3=spawn, 4=goal
  const grid = [];
  for (let r = 0; r < ROWS; r++) grid.push(new Array(COLS).fill(0));
  const SPAWN = { c: Math.floor(COLS / 2), r: 0 };
  const GOAL  = { c: Math.floor(COLS / 2), r: ROWS - 1 };
  grid[SPAWN.r][SPAWN.c] = 3;
  grid[GOAL.r][GOAL.c]   = 4;

  // Deterministic decoration map for empty tiles (rocks/trees/bushes)
  const DECOR = []; // { c, r, kind, scale }
  function buildDecor() {
    DECOR.length = 0;
    // simple deterministic noise
    function h(c, r) { return ((c * 374761393 + r * 668265263) ^ ((c+r)*2246822519)) >>> 0; }
    for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) {
      if ((c === SPAWN.c && r === SPAWN.r) || (c === GOAL.c && r === GOAL.r)) continue;
      const x = h(c, r) % 100;
      // ~15% of tiles get decoration; pick which kind
      if (x < 4)       DECOR.push({ c, r, kind: 'rock', scale: 0.7 + (h(c+1, r) % 30) / 100 });
      else if (x < 9)  DECOR.push({ c, r, kind: 'tree', scale: 0.85 + (h(c, r+1) % 20) / 100 });
      else if (x < 13) DECOR.push({ c, r, kind: 'bush', scale: 0.7 + (h(c+2, r+2) % 30) / 100 });
    }
  }
  buildDecor();

  function tileToWorld(c, r) { return { x: GRID_X + c * TILE, y: GRID_Y + r * TILE }; }
  function tileCenter(c, r) { return { x: GRID_X + c * TILE + TILE/2, y: GRID_Y + r * TILE + TILE/2 }; }
  function worldToTile(x, y) {
    const c = Math.floor((x - GRID_X) / TILE);
    const r = Math.floor((y - GRID_Y) / TILE);
    if (c < 0 || c >= COLS || r < 0 || r >= ROWS) return null;
    return { c, r };
  }
  function isWalkable(c, r) {
    if (c < 0 || c >= COLS || r < 0 || r >= ROWS) return false;
    const v = grid[r][c];
    return v === 0 || v === 3 || v === 4;
  }

  // ============================================================================
  // A* PATHFINDING
  // ============================================================================
  function findPath(startC, startR, goalC, goalR, blockExtra) {
    const closed = new Uint8Array(COLS * ROWS);
    const gScore = new Float32Array(COLS * ROWS); gScore.fill(Infinity);
    const cameFrom = new Int32Array(COLS * ROWS); cameFrom.fill(-1);
    function key(c, r) { return r * COLS + c; }
    function blocked(c, r) {
      if (!isWalkable(c, r)) return true;
      if (blockExtra && blockExtra.c === c && blockExtra.r === r) return true;
      return false;
    }
    const open = [];
    const startKey = key(startC, startR);
    gScore[startKey] = 0;
    open.push({ c: startC, r: startR, f: Math.abs(startC - goalC) + Math.abs(startR - goalR) });
    while (open.length) {
      open.sort((a, b) => a.f - b.f);
      const cur = open.shift();
      const ck = key(cur.c, cur.r);
      if (closed[ck]) continue;
      closed[ck] = 1;
      if (cur.c === goalC && cur.r === goalR) {
        const path = [{ c: cur.c, r: cur.r }];
        let kk = ck;
        while (cameFrom[kk] !== -1) {
          kk = cameFrom[kk];
          path.unshift({ c: kk % COLS, r: Math.floor(kk / COLS) });
        }
        return path;
      }
      const ns = [[1,0],[-1,0],[0,1],[0,-1]];
      for (const [dc, dr] of ns) {
        const nc = cur.c + dc, nr = cur.r + dr;
        if (blocked(nc, nr)) continue;
        const nk = key(nc, nr);
        if (closed[nk]) continue;
        const tentative = gScore[ck] + 1;
        if (tentative < gScore[nk]) {
          gScore[nk] = tentative;
          cameFrom[nk] = ck;
          const f = tentative + Math.abs(nc - goalC) + Math.abs(nr - goalR);
          open.push({ c: nc, r: nr, f });
        }
      }
    }
    return null;
  }

  let currentPath = null;
  function recomputePath() { currentPath = findPath(SPAWN.c, SPAWN.r, GOAL.c, GOAL.r); }
  recomputePath();

  // Set of tile keys that are part of the current path (for tile painting)
  let pathSet = new Set();
  function rebuildPathSet() {
    pathSet = new Set();
    if (!currentPath) return;
    for (const p of currentPath) pathSet.add(p.r * COLS + p.c);
  }
  rebuildPathSet();

  // ============================================================================
  // GAME STATE
  // ============================================================================
  let gold = 150;
  let lives = 20;
  let waveIdx = 0;
  let waveActive = false;
  let waveTimer = 0;
  let spawnQueue = [];
  let gameOver = false;
  let bestWave = 0;
  try { bestWave = parseInt(localStorage.getItem('bloo.td.bestWave') || '0', 10); } catch(_) {}
  let selectedType = 'blaster';
  let hover = null;
  let particles = [];
  let projectiles = [];
  const fxBlasts = [];
  function fxBlast(x, y, sprite, size = 70) { fxBlasts.push({ x, y, t: 0, life: 22, sprite, size }); }

  // ----- 8 Tower types -----
  const TOWER_TYPES = {
    blaster:  { name: 'Blaster',  cost: 50,  range: TILE * 2.4, fireRate: 18, damage: 3,  color: '#9cd6ff', kind: 'shot',     proj: 'p_shot',    sound: 'blaster',   sprite: 't_blaster' },
    cannon:   { name: 'Cannon',   cost: 90,  range: TILE * 2.8, fireRate: 50, damage: 14, color: '#ff8a3a', kind: 'shot',     proj: 'p_shot',    sound: 'cannon',    sprite: 't_cannon' },
    lightning:{ name: 'Lightning',cost: 140, range: TILE * 2.6, fireRate: 38, damage: 5,  color: '#9cd6ff', kind: 'chain',    proj: 'p_chain',   sound: 'lightning', sprite: 't_lightning' },
    pulse:    { name: 'Pulse',    cost: 160, range: TILE * 1.8, fireRate: 60, damage: 6,  color: '#ff5cb8', kind: 'aoe_pulse',proj: null,        sound: 'pulse',     sprite: 't_pulse' },
    ice:      { name: 'Ice',      cost: 75,  range: TILE * 2.0, fireRate: 32, damage: 1,  color: '#9cd6ff', kind: 'slow',     proj: 'p_ice',     sound: 'ice',       sprite: 't_ice' },
    plasma:   { name: 'Plasma',   cost: 180, range: TILE * 2.4, fireRate: 45, damage: 10, color: '#ff5cb8', kind: 'splash',   proj: 'p_plasma',  sound: 'plasma',    sprite: 't_plasma',  splashRadius: TILE * 1.0 },
    missile:  { name: 'Missile',  cost: 200, range: TILE * 4.0, fireRate: 70, damage: 25, color: '#ff5c8a', kind: 'homing',   proj: 'p_missile', sound: 'missile',   sprite: 't_missile' },
    aura:     { name: 'Aura',     cost: 250, range: TILE * 2.0, fireRate: 0,  damage: 0,  color: '#c46cff', kind: 'aura',     proj: null,        sound: 'place',     sprite: 't_aura' },
  };

  // ----- 8 Enemy types -----
  const ENEMY_TYPES = {
    basic:    { hp: 12,  speed: 0.85, gold: 6,  sprite: 'e_basic',    radius: 16, name: 'Basic' },
    fast:     { hp: 6,   speed: 1.7,  gold: 5,  sprite: 'e_fast',     radius: 13, name: 'Fast' },
    tank:     { hp: 50,  speed: 0.5,  gold: 18, sprite: 'e_tank',     radius: 20, name: 'Tank' },
    flying:   { hp: 18,  speed: 1.0,  gold: 10, sprite: 'e_flying',   radius: 16, name: 'Flying',   resist: 0.5 },
    shielded: { hp: 25,  speed: 0.75, gold: 14, sprite: 'e_shielded', radius: 17, name: 'Shielded', armor: 1 },
    healer:   { hp: 18,  speed: 0.7,  gold: 14, sprite: 'e_healer',   radius: 16, name: 'Healer',   healRate: 60, healAmount: 1, healRadius: TILE * 1.6 },
    summoner: { hp: 30,  speed: 0.6,  gold: 20, sprite: 'e_summoner', radius: 18, name: 'Summoner', summonsOnDeath: 2 },
    boss:     { hp: 350, speed: 0.45, gold: 120, sprite: 'e_boss',    radius: 28, name: 'Boss', isBoss: true, armor: 2 },
  };

  const towers = [];
  const enemies = [];

  // ----- Endless wave generator -----
  // Each wave returns a list of [type, count] spawn entries plus an HP scalar
  // applied to every enemy spawned. As the wave number grows the mix shifts
  // toward harder types and the HP / counts climb.
  function generateWave(idx) {
    // idx is 0-based wave number
    const n = idx + 1;
    const spawns = [];
    // Always at least some basic enemies, scaling up
    spawns.push(['basic', 4 + Math.floor(n * 1.2)]);
    if (n >= 2) spawns.push(['fast', Math.min(20, 2 + Math.floor(n * 0.9))]);
    if (n >= 3) spawns.push(['shielded', Math.min(12, Math.floor(n * 0.6))]);
    if (n >= 4) spawns.push(['tank', Math.min(8, Math.floor(n * 0.3))]);
    if (n >= 5) spawns.push(['healer', Math.min(5, Math.floor(n / 4))]);
    if (n >= 6) spawns.push(['flying', Math.min(10, Math.floor((n - 5) * 0.8))]);
    if (n >= 7) spawns.push(['summoner', Math.min(6, Math.floor((n - 6) * 0.6))]);
    // Boss every 5 waves (5, 10, 15, ...). After wave 10 add multiple bosses.
    let bossCount = 0;
    if (n % 5 === 0) bossCount = 1 + Math.floor((n - 5) / 10);
    if (bossCount) spawns.push(['boss', bossCount]);
    // Per-enemy HP multiplier — climbs with wave number
    const hpMul = 1 + Math.max(0, n - 1) * 0.18;
    // Spacing between spawns shortens as the game goes on
    const spacing = Math.max(8, 24 - Math.floor(n * 0.4));
    return { spawns, hpMul, spacing };
  }

  function startWave() {
    if (waveActive || gameOver) return;
    Audio.waveStart();
    const w = generateWave(waveIdx);
    spawnQueue = [];
    let delay = 30;
    for (const [type, count] of w.spawns) {
      for (let i = 0; i < count; i++) { spawnQueue.push({ type, delay, hpMul: w.hpMul }); delay += w.spacing; }
    }
    // Shuffle so types are interleaved instead of all-of-one-then-all-of-another
    for (let i = spawnQueue.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [spawnQueue[i], spawnQueue[j]] = [spawnQueue[j], spawnQueue[i]];
    }
    // Re-sort so original delays are kept but types are mixed
    let t = 30;
    for (const s of spawnQueue) { s.delay = t; t += w.spacing; }
    waveActive = true;
    waveTimer = 0;
  }

  function spawnEnemy(type, hpMul) {
    const def = ENEMY_TYPES[type];
    if (!def) return;
    const center = tileCenter(SPAWN.c, SPAWN.r);
    const mul = hpMul || 1;
    const hp = Math.ceil(def.hp * mul);
    enemies.push({
      x: center.x, y: center.y - 6,
      type, hp, hpMax: hp,
      speed: def.speed * (1 + Math.min(0.5, waveIdx * 0.015)),  // slight speed scaling
      slowT: 0,
      pathIdx: 1,
      isBoss: !!def.isBoss,
      armor: def.armor || 0,
      resist: def.resist || 0,
      healT: def.healRate ? Math.floor(Math.random()*60) : 0,
      hitFlash: 0,
    });
  }

  function damageEnemy(e, dmg, isAoe) {
    let d = dmg;
    if (e.armor && d > e.armor) d -= e.armor;
    else if (e.armor) d = Math.max(1, Math.floor(d * 0.5));
    if (e.resist) d = Math.max(1, d * (1 - e.resist));
    e.hp -= d;
    e.hitFlash = 6;
    if (e.hp <= 0) {
      gold += ENEMY_TYPES[e.type].gold;
      Audio.enemyDie();
      burst(e.x, e.y, '#a020a0', 14);
      fxBlast(e.x, e.y, 'fx_explosion', e.isBoss ? 130 : 80);
      // Summoner spawns minions on death
      const def = ENEMY_TYPES[e.type];
      if (def.summonsOnDeath) {
        for (let i = 0; i < def.summonsOnDeath; i++) {
          const m = { ...e };
          spawnEnemy('fast');
          // place near death location
          const last = enemies[enemies.length - 1];
          last.x = e.x + (Math.random() - 0.5) * 20;
          last.y = e.y + (Math.random() - 0.5) * 20;
          last.pathIdx = e.pathIdx;
        }
      }
      return true;
    } else {
      fxBlast(e.x, e.y, 'fx_hit', 36);
    }
    return false;
  }

  function burst(x, y, color, n = 8) {
    for (let i = 0; i < n; i++) particles.push({ x, y, vx:(Math.random()-.5)*4, vy:(Math.random()-.5)*4, life: 26, color });
  }

  // ============================================================================
  // INPUT
  // ============================================================================
  function pointerXY(e) {
    const rect = canvas.getBoundingClientRect();
    const p = e.touches ? e.touches[0] : e;
    return { x: (p.clientX - rect.left) * (W / rect.width), y: (p.clientY - rect.top) * (H / rect.height) };
  }
  canvas.addEventListener('pointerdown', (e) => { Audio.ensure(); const p = pointerXY(e); handleClick(p.x, p.y); e.preventDefault(); });
  canvas.addEventListener('pointermove', (e) => { const p = pointerXY(e); hover = worldToTile(p.x, p.y); e.preventDefault(); });
  canvas.addEventListener('contextmenu', (e) => e.preventDefault());

  const muteBtn = document.getElementById('btn-mute');
  function refreshMute(){ muteBtn.textContent = Audio.isMuted() ? '🔇' : '🔊'; }
  refreshMute();
  muteBtn.addEventListener('click', () => { Audio.setMuted(!Audio.isMuted()); refreshMute(); });
  addEventListener('keydown', (e) => { if (e.code === 'KeyM') { Audio.setMuted(!Audio.isMuted()); refreshMute(); } });

  // Palette layout: 8 buttons in 2 rows × 4 cols
  function paletteRect() {
    const palY = H - 130, palH = 116;
    return { x: 14, y: palY, w: W - 28, h: palH };
  }
  function paletteButtons() {
    const r = paletteRect();
    const types = Object.keys(TOWER_TYPES);
    const cols = 4, rows = 2;
    const cellW = (r.w - 14) / cols, cellH = (r.h - 14) / rows;
    const out = [];
    for (let i = 0; i < types.length; i++) {
      const col = i % cols, row = Math.floor(i / cols);
      out.push({ type: types[i], x: r.x + 7 + col * cellW, y: r.y + 7 + row * cellH, w: cellW - 4, h: cellH - 4 });
    }
    return out;
  }
  // Start button rect is computed inside drawHUD and cached for the next click frame.
  function startBtnRect() {
    return startBtnRect.cached || { x: W - 168, y: 18, w: 156, h: 52 };
  }

  function handleClick(x, y) {
    if (gameOver) { restart(); return; }
    const sb = startBtnRect();
    if (!waveActive && x >= sb.x && x <= sb.x + sb.w && y >= sb.y && y <= sb.y + sb.h) { startWave(); return; }
    // Palette
    const btns = paletteButtons();
    for (const b of btns) {
      if (x >= b.x && x <= b.x + b.w && y >= b.y && y <= b.y + b.h) {
        selectedType = b.type;
        return;
      }
    }
    // Place tower
    const t = worldToTile(x, y);
    if (!t) return;
    tryPlaceTower(t.c, t.r);
  }

  function tryPlaceTower(c, r) {
    const def = TOWER_TYPES[selectedType];
    if (!def) return;
    if (grid[r][c] !== 0) { Audio.cantPlace(); return; }
    if (gold < def.cost) { Audio.cantPlace(); return; }
    const testPath = findPath(SPAWN.c, SPAWN.r, GOAL.c, GOAL.r, { c, r });
    if (!testPath) { Audio.cantPlace(); return; }
    grid[r][c] = 1;
    towers.push({ c, r, type: selectedType, cooldown: 0, fireFlash: 0 });
    gold -= def.cost;
    Audio.place();
    currentPath = testPath;
    rebuildPathSet();
    for (const e of enemies) {
      let bestIdx = 1, bestDist = Infinity;
      for (let i = 1; i < currentPath.length; i++) {
        const wp = tileCenter(currentPath[i].c, currentPath[i].r);
        const d = (wp.x - e.x) ** 2 + (wp.y - e.y) ** 2;
        if (d < bestDist) { bestDist = d; bestIdx = i; }
      }
      e.pathIdx = bestIdx;
    }
  }

  function restart() {
    for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) {
      if (grid[r][c] === 1) grid[r][c] = 0;
    }
    towers.length = 0; enemies.length = 0; projectiles.length = 0; particles.length = 0; fxBlasts.length = 0;
    gold = 150; lives = 20; waveIdx = 0; waveActive = false; spawnQueue.length = 0;
    gameOver = false; selectedType = 'blaster';
    recomputePath(); rebuildPathSet();
  }

  // ============================================================================
  // UPDATE
  // ============================================================================
  let animT = 0;
  function update() {
    animT++;
    if (gameOver) return;

    if (waveActive) {
      waveTimer++;
      while (spawnQueue.length && spawnQueue[0].delay <= waveTimer) {
        const s = spawnQueue.shift();
        spawnEnemy(s.type, s.hpMul);
      }
      if (spawnQueue.length === 0 && enemies.length === 0) {
        waveActive = false;
        waveIdx++;
        // End-of-wave bonus scales with wave number
        gold += 30 + waveIdx * 8;
      }
    }

    // Healers regen nearby enemies
    for (const e of enemies) {
      const def = ENEMY_TYPES[e.type];
      if (def.healRate) {
        e.healT++;
        if (e.healT >= def.healRate) {
          e.healT = 0;
          for (const o of enemies) {
            if (o === e || o.hp >= o.hpMax) continue;
            const dd = (o.x - e.x) ** 2 + (o.y - e.y) ** 2;
            if (dd < def.healRadius * def.healRadius) {
              o.hp = Math.min(o.hpMax, o.hp + def.healAmount);
              fxBlast(o.x, o.y, 'fx_crit', 32);
            }
          }
        }
      }
      if (e.hitFlash > 0) e.hitFlash--;
    }

    // Move enemies
    for (const e of enemies) {
      const def = ENEMY_TYPES[e.type];
      if (e.pathIdx >= currentPath.length) continue;
      const target = tileCenter(currentPath[e.pathIdx].c, currentPath[e.pathIdx].r);
      const dx = target.x - e.x, dy = target.y - e.y;
      const d = Math.hypot(dx, dy);
      const slowFactor = e.slowT > 0 ? 0.5 : 1;
      if (e.slowT > 0) e.slowT--;
      const sp = e.speed * slowFactor;
      if (d < sp) {
        e.x = target.x; e.y = target.y - 6;
        e.pathIdx++;
        if (e.pathIdx >= currentPath.length) {
          lives -= e.isBoss ? 5 : 1;
          Audio.reachGoal();
          e.dead = true;
          if (lives <= 0) {
            gameOver = 'lose'; Audio.lose();
            if (waveIdx > bestWave) {
              bestWave = waveIdx;
              try { localStorage.setItem('bloo.td.bestWave', String(bestWave)); } catch(_) {}
            }
            // Leaderboard submission
            try {
              if (typeof BlooLB !== 'undefined') {
                BlooLB.ensureUsername().then(() => {
                  BlooLB.submitScore('tower', waveIdx, { lives: 0, towers: towers.length });
                });
              }
            } catch (_) {}
          }
        }
      } else {
        e.x += sp * dx / d;
        e.y += sp * dy / d;
      }
    }
    for (let i = enemies.length - 1; i >= 0; i--) if (enemies[i].dead || enemies[i].hp <= 0) enemies.splice(i, 1);

    // Towers attack
    for (const t of towers) {
      const def = TOWER_TYPES[t.type];
      const tc = tileCenter(t.c, t.r);
      // Aura tower buffs nearby tower fire rates
      if (def.kind === 'aura') {
        // Apply buff each frame (just sets a flag — we read it during fire-rate calc)
        for (const ot of towers) {
          if (ot === t) continue;
          const dd = (tileCenter(ot.c, ot.r).x - tc.x) ** 2 + (tileCenter(ot.c, ot.r).y - tc.y) ** 2;
          ot.auraBuff = (dd < def.range * def.range) ? 1 : Math.max(0, (ot.auraBuff || 0) - 0.05);
        }
        continue;
      }
      t.cooldown--;
      if (t.fireFlash > 0) t.fireFlash--;
      if (t.cooldown > 0) continue;

      // AOE pulse: damage all enemies in range periodically
      if (def.kind === 'aoe_pulse') {
        let hitAny = false;
        for (const e of enemies) {
          const dd = (e.x - tc.x) ** 2 + (e.y - tc.y) ** 2;
          if (dd < def.range * def.range) {
            damageEnemy(e, def.damage);
            burst(e.x, e.y, def.color, 4);
            hitAny = true;
          }
        }
        if (hitAny) {
          t.fireFlash = 10;
          fxBlast(tc.x, tc.y, 'fx_explosion', def.range * 2);
          Audio[def.sound]();
          // Apply buffed cooldown
          const buff = (t.auraBuff || 0);
          t.cooldown = Math.floor(def.fireRate * (1 - 0.30 * buff));
        }
        continue;
      }

      // Find target — closest enemy in range
      let best = null, bestD = def.range * def.range;
      for (const e of enemies) {
        const dd = (e.x - tc.x) ** 2 + (e.y - tc.y) ** 2;
        if (dd < bestD) { bestD = dd; best = e; }
      }
      if (!best) continue;
      t.fireFlash = 8;
      const buff = (t.auraBuff || 0);
      t.cooldown = Math.floor(def.fireRate * (1 - 0.30 * buff));
      Audio[def.sound]();

      if (def.kind === 'shot') {
        projectiles.push({ x: tc.x, y: tc.y, target: best, damage: def.damage, sprite: def.proj, color: def.color, type: 'shot', speed: 9 });
      } else if (def.kind === 'slow') {
        // Frost AoE: slow all + small dmg
        for (const e of enemies) {
          const dd = (e.x - tc.x) ** 2 + (e.y - tc.y) ** 2;
          if (dd < def.range * def.range) {
            e.slowT = Math.max(e.slowT, 60);
            damageEnemy(e, def.damage);
            burst(e.x, e.y, def.color, 4);
            fxBlast(e.x, e.y, 'fx_ice', 36);
          }
        }
      } else if (def.kind === 'chain') {
        // Pick up to 3 nearest, chain lightning beams
        const inRange = enemies
          .map(e => ({ e, d: (e.x - tc.x) ** 2 + (e.y - tc.y) ** 2 }))
          .filter(x => x.d < def.range * def.range)
          .sort((a, b) => a.d - b.d)
          .slice(0, 3);
        let prev = { x: tc.x, y: tc.y };
        for (const { e } of inRange) {
          damageEnemy(e, def.damage);
          burst(e.x, e.y, def.color, 6);
          projectiles.push({ x: prev.x, y: prev.y, ex: e.x, ey: e.y, color: def.color, type: 'beam', life: 10, sprite: def.proj });
          prev = { x: e.x, y: e.y };
        }
      } else if (def.kind === 'splash') {
        projectiles.push({ x: tc.x, y: tc.y, target: best, damage: def.damage, sprite: def.proj, color: def.color, type: 'splash', speed: 7, splashRadius: def.splashRadius });
      } else if (def.kind === 'homing') {
        projectiles.push({ x: tc.x, y: tc.y, vx: 0, vy: -1, target: best, damage: def.damage, sprite: def.proj, color: def.color, type: 'homing', speed: 5 });
      }
    }

    // Move projectiles
    for (const p of projectiles) {
      if (p.type === 'beam') { p.life--; continue; }
      if (p.type === 'homing') {
        // Steer toward target
        if (p.target && p.target.hp > 0) {
          const dx = p.target.x - p.x, dy = p.target.y - p.y;
          const d = Math.hypot(dx, dy);
          if (d > 0) {
            const tvx = p.speed * dx / d, tvy = p.speed * dy / d;
            p.vx += (tvx - p.vx) * 0.15;
            p.vy += (tvy - p.vy) * 0.15;
          }
        } else if (!p.target || p.target.hp <= 0) { p.dead = true; continue; }
        p.x += p.vx; p.y += p.vy;
        if (p.target && Math.hypot(p.target.x - p.x, p.target.y - p.y) < p.target ? 12 : 10) {
          if (p.target && p.target.hp > 0) {
            damageEnemy(p.target, p.damage);
            fxBlast(p.x, p.y, 'fx_explosion', 60);
          }
          p.dead = true;
        }
      } else {
        // shot or splash: linear
        const tx = p.target ? p.target.x : p.tx;
        const ty = p.target ? p.target.y : p.ty;
        const dx = tx - p.x, dy = ty - p.y;
        const d = Math.hypot(dx, dy);
        const sp = p.speed || 9;
        if (d < sp) {
          if (p.target && p.target.hp > 0) {
            damageEnemy(p.target, p.damage);
            // Splash damage to nearby
            if (p.type === 'splash' && p.splashRadius) {
              for (const e of enemies) {
                if (e === p.target) continue;
                const dd = (e.x - tx) ** 2 + (e.y - ty) ** 2;
                if (dd < p.splashRadius * p.splashRadius) damageEnemy(e, Math.ceil(p.damage * 0.5), true);
              }
              fxBlast(tx, ty, 'fx_explosion', 70);
            }
          }
          p.dead = true;
        } else {
          p.x += sp * dx / d;
          p.y += sp * dy / d;
        }
      }
    }
    for (let i = projectiles.length - 1; i >= 0; i--) {
      const p = projectiles[i];
      if (p.dead || (p.type === 'beam' && p.life <= 0)) projectiles.splice(i, 1);
    }

    for (const pa of particles) { pa.x += pa.vx; pa.y += pa.vy; pa.vy += 0.18; pa.life--; }
    for (let i = particles.length - 1; i >= 0; i--) if (particles[i].life <= 0) particles.splice(i, 1);
    for (const f of fxBlasts) f.t++;
    for (let i = fxBlasts.length - 1; i >= 0; i--) if (fxBlasts[i].t > fxBlasts[i].life) fxBlasts.splice(i, 1);
  }

  // ============================================================================
  // DRAW
  // ============================================================================
  function drawBg() {
    ctx.fillStyle = '#0a0716'; ctx.fillRect(0, 0, W, H);
    const g = ctx.createLinearGradient(0, 0, 0, H);
    g.addColorStop(0, '#1a0e3a');
    g.addColorStop(0.6, '#0f0820');
    g.addColorStop(1, '#0a0716');
    ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
  }

  function drawTilesAndDecor() {
    // Painted grass tile across the whole grid — overdraw with path tiles where needed
    if (ok('tile_grass')) {
      for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) {
        const x = GRID_X + c * TILE, y = GRID_Y + r * TILE;
        ctx.drawImage(ASSETS.tile_grass, x, y, TILE, TILE);
      }
    } else {
      // fallback flat fill
      ctx.fillStyle = '#1a2030'; ctx.fillRect(GRID_X, GRID_Y, COLS * TILE, ROWS * TILE);
    }
    // Paint path tiles
    if (ok('tile_path') && currentPath) {
      for (const p of currentPath) {
        const x = GRID_X + p.c * TILE, y = GRID_Y + p.r * TILE;
        ctx.drawImage(ASSETS.tile_path, x, y, TILE, TILE);
      }
    }
    // Decoration sprites scattered on grass tiles (skip tower tiles & path tiles)
    for (const d of DECOR) {
      if (grid[d.r][d.c] === 1) continue; // hide decor on tower tiles
      if (pathSet.has(d.r * COLS + d.c)) continue; // hide decor on path tiles
      const key = d.kind === 'rock' ? 'tile_rock' : (d.kind === 'tree' ? 'tile_tree' : 'tile_bush');
      if (!ok(key)) continue;
      const img = ASSETS[key];
      const aspect = img.width / img.height;
      const h = TILE * d.scale;
      const w = h * aspect;
      const cx = GRID_X + d.c * TILE + TILE/2;
      const by = GRID_Y + d.r * TILE + TILE - 4;
      ctx.drawImage(img, cx - w/2, by - h, w, h);
    }
  }

  function drawSpawnGoal() {
    const sp = tileToWorld(SPAWN.c, SPAWN.r);
    const gp = tileToWorld(GOAL.c, GOAL.r);
    if (ok('tile_portal')) {
      const img = ASSETS.tile_portal;
      const ar = img.width / img.height;
      const h = TILE * 1.2, w = h * ar;
      const x = sp.x + TILE/2 - w/2, y = sp.y + TILE - h - 2;
      // Pulse glow under it
      ctx.shadowColor = '#ff5cb8'; ctx.shadowBlur = 14 + Math.sin(animT * 0.1) * 4;
      ctx.drawImage(img, x, y, w, h);
      ctx.shadowBlur = 0;
    }
    if (ok('tile_base')) {
      const img = ASSETS.tile_base;
      const ar = img.width / img.height;
      const h = TILE * 1.2, w = h * ar;
      const x = gp.x + TILE/2 - w/2, y = gp.y + TILE - h - 2;
      ctx.shadowColor = '#9cd6ff'; ctx.shadowBlur = 14;
      ctx.drawImage(img, x, y, w, h);
      ctx.shadowBlur = 0;
    }
  }

  function drawPathTrail() {
    // Light pink trail line on top of path tiles to show direction (animated dashes)
    if (!currentPath || currentPath.length < 2) return;
    ctx.strokeStyle = 'rgba(255, 92, 184, 0.35)';
    ctx.lineWidth = 2;
    ctx.lineCap = 'round'; ctx.lineJoin = 'round';
    ctx.setLineDash([6, 12]);
    ctx.lineDashOffset = -animT * 0.8;
    ctx.beginPath();
    const first = tileCenter(currentPath[0].c, currentPath[0].r);
    ctx.moveTo(first.x, first.y);
    for (let i = 1; i < currentPath.length; i++) {
      const p = tileCenter(currentPath[i].c, currentPath[i].r);
      ctx.lineTo(p.x, p.y);
    }
    ctx.stroke();
    ctx.setLineDash([]);
  }

  function drawHover() {
    if (!hover) return;
    if (hover.c < 0 || hover.c >= COLS || hover.r < 0 || hover.r >= ROWS) return;
    const def = TOWER_TYPES[selectedType];
    const valid = grid[hover.r][hover.c] === 0 && gold >= def.cost && !!findPath(SPAWN.c, SPAWN.r, GOAL.c, GOAL.r, { c: hover.c, r: hover.r });
    const wp = tileToWorld(hover.c, hover.r);
    ctx.fillStyle = valid ? 'rgba(80, 255, 140, 0.20)' : 'rgba(255, 90, 140, 0.25)';
    ctx.fillRect(wp.x, wp.y, TILE, TILE);
    ctx.strokeStyle = valid ? '#5fe87a' : '#ff5c8a';
    ctx.lineWidth = 2;
    ctx.strokeRect(wp.x + 1, wp.y + 1, TILE - 2, TILE - 2);
    if (valid) {
      const c = tileCenter(hover.c, hover.r);
      ctx.strokeStyle = 'rgba(255, 255, 255, 0.30)'; ctx.lineWidth = 1; ctx.setLineDash([4, 6]);
      ctx.beginPath(); ctx.arc(c.x, c.y, def.range, 0, Math.PI*2); ctx.stroke();
      ctx.setLineDash([]);
    }
  }

  // Draw range circles UNDER all towers so they layer below sprites and don't fight for attention
  function drawTowerRanges() {
    if (!towers.length) return;
    ctx.save();
    for (const t of towers) {
      const def = TOWER_TYPES[t.type];
      const c = tileCenter(t.c, t.r);
      // Subtle filled disc tinted by tower color
      const grad = ctx.createRadialGradient(c.x, c.y, 0, c.x, c.y, def.range);
      grad.addColorStop(0, hexToRgba(def.color, 0.0));
      grad.addColorStop(0.85, hexToRgba(def.color, 0.05));
      grad.addColorStop(1, hexToRgba(def.color, 0.10));
      ctx.fillStyle = grad;
      ctx.beginPath(); ctx.arc(c.x, c.y, def.range, 0, Math.PI * 2); ctx.fill();
      // Dashed outline so the edge is readable
      ctx.strokeStyle = hexToRgba(def.color, 0.55);
      ctx.lineWidth = 1.2;
      ctx.setLineDash([5, 5]);
      ctx.beginPath(); ctx.arc(c.x, c.y, def.range, 0, Math.PI * 2); ctx.stroke();
    }
    ctx.setLineDash([]);
    ctx.restore();
  }
  function hexToRgba(hex, a) {
    const m = hex.replace('#','');
    const r = parseInt(m.slice(0,2),16), g = parseInt(m.slice(2,4),16), b = parseInt(m.slice(4,6),16);
    return `rgba(${r},${g},${b},${a})`;
  }

  function drawTowers() {
    // Sort by row so back towers draw first (basic depth)
    const sorted = towers.slice().sort((a, b) => a.r - b.r);
    for (const t of sorted) {
      const def = TOWER_TYPES[t.type];
      const center = tileCenter(t.c, t.r);
      const img = ASSETS[def.sprite];
      if (img && img.width && !img._failed) {
        const sw = img.width, sh = Math.floor(img.height * 0.92);
        const targetH = TILE * 1.55;
        const aspect = sw / sh;
        const targetW = targetH * aspect;
        const dx = center.x - targetW / 2;
        const dy = center.y + TILE/2 - targetH;
        if (t.fireFlash > 0) { ctx.shadowColor = def.color; ctx.shadowBlur = 18; }
        else if (t.auraBuff > 0.1) { ctx.shadowColor = '#c46cff'; ctx.shadowBlur = 8 + 6 * t.auraBuff; }
        ctx.drawImage(img, 0, 0, sw, sh, dx, dy, targetW, targetH);
        ctx.shadowBlur = 0;
      } else {
        ctx.fillStyle = def.color;
        ctx.beginPath(); ctx.arc(center.x, center.y, 16, 0, Math.PI*2); ctx.fill();
      }
    }
  }

  function drawEnemies() {
    // Sort by y (bigger y in front)
    const sorted = enemies.slice().sort((a, b) => a.y - b.y);
    for (const e of sorted) {
      const def = ENEMY_TYPES[e.type];
      const img = ASSETS[def.sprite];
      if (img && img.width && !img._failed) {
        const ar = img.width / img.height;
        const h = def.radius * 2.4;
        const w = h * ar;
        if (e.hitFlash > 0) { ctx.shadowColor = '#fff'; ctx.shadowBlur = 14; }
        else if (e.isBoss) { ctx.shadowColor = '#ff5cb8'; ctx.shadowBlur = 16; }
        else { ctx.shadowColor = '#a020a0'; ctx.shadowBlur = 8; }
        ctx.drawImage(img, e.x - w/2, e.y - h/2, w, h);
        ctx.shadowBlur = 0;
      } else {
        ctx.fillStyle = '#3a0a55';
        ctx.beginPath(); ctx.arc(e.x, e.y, def.radius, 0, Math.PI*2); ctx.fill();
      }
      // HP bar
      const barW = def.radius * 2;
      const barX = e.x - barW/2, barY = e.y - def.radius - 12;
      ctx.fillStyle = 'rgba(0,0,0,0.55)'; ctx.fillRect(barX, barY, barW, 4);
      const pct = Math.max(0, e.hp / e.hpMax);
      ctx.fillStyle = pct > 0.5 ? '#5fe87a' : (pct > 0.2 ? '#ffd54a' : '#ff5c8a');
      ctx.fillRect(barX, barY, barW * pct, 4);
      // Slow indicator
      if (e.slowT > 0 && ok('fx_slow')) {
        const sz = def.radius * 3;
        ctx.globalAlpha = 0.5 + 0.25 * Math.sin(e.slowT * 0.2);
        ctx.drawImage(ASSETS.fx_slow, e.x - sz/2, e.y - sz/4, sz, sz/2);
        ctx.globalAlpha = 1;
      }
    }
  }

  function drawProjectiles() {
    for (const p of projectiles) {
      if (p.type === 'beam') {
        const a = p.life / 10;
        ctx.strokeStyle = p.color; ctx.lineWidth = 2 + 4 * a;
        ctx.shadowColor = p.color; ctx.shadowBlur = 14;
        ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(p.ex, p.ey); ctx.stroke();
        ctx.shadowBlur = 0;
        // Optionally overlay chain sprite (small)
        continue;
      }
      // Sprite projectile
      const img = p.sprite ? ASSETS[p.sprite] : null;
      if (img && img.width && !img._failed) {
        const ar = img.width / img.height;
        const h = 18, w = h * ar;
        // Rotate to direction of motion
        let ang = 0;
        if (p.target) ang = Math.atan2(p.target.y - p.y, p.target.x - p.x);
        else if (p.vx !== undefined) ang = Math.atan2(p.vy, p.vx);
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(ang);
        ctx.shadowColor = p.color; ctx.shadowBlur = 10;
        ctx.drawImage(img, -w/2, -h/2, w, h);
        ctx.shadowBlur = 0;
        ctx.restore();
      } else {
        ctx.shadowColor = p.color; ctx.shadowBlur = 10;
        ctx.fillStyle = p.color;
        ctx.beginPath(); ctx.arc(p.x, p.y, 4, 0, Math.PI*2); ctx.fill();
        ctx.shadowBlur = 0;
      }
    }
  }

  function drawFxBlasts() {
    for (const f of fxBlasts) {
      const img = ASSETS[f.sprite];
      if (!img || !img.width || img._failed) continue;
      const t = f.t / f.life;
      const scale = 0.7 + 0.6 * t;
      const alpha = Math.max(0, 1 - t);
      const ar = img.width / img.height;
      const w = f.size * scale, h = w / ar;
      ctx.globalAlpha = alpha;
      ctx.drawImage(img, f.x - w/2, f.y - h/2, w, h);
      ctx.globalAlpha = 1;
    }
  }

  function drawParticles() {
    for (const pa of particles) {
      ctx.globalAlpha = Math.max(0, pa.life / 26);
      ctx.fillStyle = pa.color;
      ctx.fillRect(pa.x - 2, pa.y - 2, 4, 4);
    }
    ctx.globalAlpha = 1;
  }

  function drawHUD() {
    // Top HUD bar — single row, evenly spaced columns
    const barX = 12, barY = 12, barW = W - 24, barH = 64;
    ctx.fillStyle = 'rgba(10, 5, 25, 0.78)';
    roundRect(barX, barY, barW, barH, 12); ctx.fill();
    ctx.strokeStyle = 'rgba(255, 92, 184, 0.4)'; ctx.lineWidth = 1.2; ctx.stroke();

    // The bar is split into 3 stat cells on the left + start button on the right.
    // Start button takes ~40% of width on the right, stats share the remaining 60%.
    const sbW = Math.min(160, barW * 0.42);
    const sbX = barX + barW - sbW - 8;
    const statsX = barX + 8;
    const statsW = sbX - statsX - 8;
    const cellW = statsW / 3;

    function drawStat(idx, iconKey, value, label, glowColor) {
      const cx = statsX + idx * cellW;
      // icon on left, value to its right, label under value
      const iconSize = 28;
      const iy = barY + (barH - iconSize) / 2;
      if (ok(iconKey)) {
        ctx.shadowColor = glowColor; ctx.shadowBlur = 8;
        ctx.drawImage(ASSETS[iconKey], cx + 6, iy, iconSize, iconSize);
        ctx.shadowBlur = 0;
      }
      const tx = cx + 6 + iconSize + 6;
      ctx.fillStyle = '#fff'; ctx.font = 'bold 19px system-ui'; ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';
      ctx.fillText(value, tx, barY + 32);
      ctx.fillStyle = 'rgba(255,255,255,0.55)'; ctx.font = 'bold 9px system-ui'; ctx.textBaseline = 'alphabetic';
      ctx.fillText(label, tx, barY + 48);
    }

    drawStat(0, 'u_orb',   String(gold),       'GOLD',  '#9cd6ff');
    drawStat(1, 'u_heart', String(lives),      'LIVES', '#ff5c8a');
    drawStat(2, 'u_wave',  'W' + (waveIdx + 1),'WAVE',  '#c46cff');

    // Start wave button — now lives in the right portion of the bar
    const sb = { x: sbX, y: barY + 6, w: sbW, h: barH - 12 };
    startBtnRect.cached = sb;
    if (!waveActive && !gameOver) {
      ctx.fillStyle = 'rgba(95, 232, 122, 0.22)';
      roundRect(sb.x, sb.y, sb.w, sb.h, 10); ctx.fill();
      ctx.strokeStyle = '#5fe87a'; ctx.lineWidth = 2; ctx.shadowColor = '#5fe87a'; ctx.shadowBlur = 10;
      roundRect(sb.x, sb.y, sb.w, sb.h, 10); ctx.stroke();
      ctx.shadowBlur = 0;
      if (ok('u_play')) ctx.drawImage(ASSETS.u_play, sb.x + 10, sb.y + sb.h/2 - 13, 26, 26);
      ctx.fillStyle = '#fff'; ctx.font = 'bold 13px system-ui'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText('START', sb.x + sb.w/2 + 14, sb.y + sb.h/2 - 6);
      ctx.font = 'bold 14px system-ui';
      ctx.fillText('WAVE ' + (waveIdx + 1), sb.x + sb.w/2 + 14, sb.y + sb.h/2 + 10);
    } else if (waveActive) {
      ctx.fillStyle = 'rgba(255, 92, 184, 0.20)';
      roundRect(sb.x, sb.y, sb.w, sb.h, 10); ctx.fill();
      ctx.strokeStyle = '#ff5cb8'; ctx.lineWidth = 2; roundRect(sb.x, sb.y, sb.w, sb.h, 10); ctx.stroke();
      ctx.fillStyle = '#fff'; ctx.font = 'bold 11px system-ui'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText('WAVE IN', sb.x + sb.w/2, sb.y + sb.h/2 - 8);
      ctx.fillText('PROGRESS', sb.x + sb.w/2, sb.y + sb.h/2 + 7);
    }

    drawPalette();
  }

  function drawPalette() {
    const r = paletteRect();
    ctx.fillStyle = 'rgba(10, 5, 25, 0.75)';
    roundRect(r.x, r.y, r.w, r.h, 12); ctx.fill();
    ctx.strokeStyle = 'rgba(255, 92, 184, 0.4)'; ctx.lineWidth = 1.2; ctx.stroke();

    const btns = paletteButtons();
    for (const b of btns) {
      const def = TOWER_TYPES[b.type];
      const sel = b.type === selectedType;
      const afford = gold >= def.cost;
      ctx.fillStyle = sel ? 'rgba(255, 92, 184, 0.25)' : 'rgba(255, 255, 255, 0.04)';
      roundRect(b.x, b.y, b.w, b.h, 8); ctx.fill();
      ctx.strokeStyle = sel ? '#ff5cb8' : (afford ? 'rgba(255,255,255,0.18)' : 'rgba(255,90,140,0.4)');
      ctx.lineWidth = sel ? 2 : 1;
      if (sel) { ctx.shadowColor = '#ff5cb8'; ctx.shadowBlur = 12; }
      roundRect(b.x, b.y, b.w, b.h, 8); ctx.stroke();
      ctx.shadowBlur = 0;

      // Tower icon (left side)
      const img = ASSETS[def.sprite];
      if (img && img.width && !img._failed) {
        const sh = Math.floor(img.height * 0.92);
        const targetH = b.h - 14;
        const ar = img.width / sh;
        const targetW = targetH * ar;
        const dx = b.x + 6;
        const dy = b.y + 7;
        if (sel) { ctx.shadowColor = def.color; ctx.shadowBlur = 10; }
        ctx.drawImage(img, 0, 0, img.width, sh, dx, dy, Math.min(targetW, b.h - 8), targetH);
        ctx.shadowBlur = 0;
      }

      // Right side: name + cost
      ctx.fillStyle = afford ? '#fff' : 'rgba(255, 255, 255, 0.4)';
      ctx.font = 'bold 11px system-ui'; ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
      ctx.fillText(def.name, b.x + b.h - 2, b.y + 18);
      // Cost (orb + number)
      if (ok('u_orb')) ctx.drawImage(ASSETS.u_orb, b.x + b.h - 2, b.y + b.h - 22, 14, 14);
      ctx.fillStyle = afford ? '#ffd54a' : '#ff5c8a';
      ctx.font = 'bold 12px system-ui';
      ctx.fillText(String(def.cost), b.x + b.h + 14, b.y + b.h - 14);
    }
  }

  function drawGameOver() {
    if (!gameOver) return;
    ctx.fillStyle = 'rgba(0, 0, 0, 0.80)';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#ff5c8a';
    ctx.shadowColor = '#ff5c8a'; ctx.shadowBlur = 24;
    ctx.font = 'bold 48px system-ui'; ctx.textAlign = 'center';
    ctx.fillText('BASE LOST', W/2, H * 0.40);
    ctx.shadowBlur = 0;
    // Score line — wave survived (best persisted in localStorage)
    ctx.fillStyle = '#ffd54a'; ctx.shadowColor = '#ffd54a'; ctx.shadowBlur = 14;
    ctx.font = 'bold 56px system-ui';
    ctx.fillText('WAVE ' + waveIdx, W/2, H * 0.50);
    ctx.shadowBlur = 0;
    ctx.fillStyle = 'rgba(255, 255, 255, 0.7)'; ctx.font = 'bold 14px system-ui';
    ctx.fillText('survived  ·  best ' + bestWave, W/2, H * 0.55);
    ctx.fillStyle = '#fff'; ctx.font = 'bold 14px system-ui';
    ctx.fillText('TAP / CLICK TO PLAY AGAIN', W/2, H * 0.62);
  }

  function roundRect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x+r, y);
    ctx.lineTo(x+w-r, y); ctx.quadraticCurveTo(x+w, y, x+w, y+r);
    ctx.lineTo(x+w, y+h-r); ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
    ctx.lineTo(x+r, y+h); ctx.quadraticCurveTo(x, y+h, x, y+h-r);
    ctx.lineTo(x, y+r); ctx.quadraticCurveTo(x, y, x+r, y);
    ctx.closePath();
  }

  function drawLoading() {
    ctx.fillStyle = '#0a0716'; ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#fff'; ctx.font = 'bold 18px system-ui'; ctx.textAlign = 'center';
    ctx.fillText('Loading… ' + assetsLoaded + '/' + assetsTotal, W/2, H/2);
    const pw = 240, ph = 8;
    ctx.fillStyle = 'rgba(255,255,255,0.15)'; ctx.fillRect(W/2 - pw/2, H/2 + 16, pw, ph);
    ctx.fillStyle = '#ff5cb8';
    ctx.fillRect(W/2 - pw/2, H/2 + 16, pw * (assetsLoaded / assetsTotal), ph);
  }

  function frame() {
    if (!ready()) { drawLoading(); requestAnimationFrame(frame); return; }
    update();
    drawBg();
    drawTilesAndDecor();
    drawSpawnGoal();
    drawPathTrail();
    drawTowerRanges();   // ranges drawn under towers
    drawHover();
    drawTowers();
    drawProjectiles();
    drawEnemies();
    drawFxBlasts();
    drawParticles();
    drawHUD();
    drawGameOver();
    requestAnimationFrame(frame);
  }
  frame();
})();
</script>
</body>
</html>
